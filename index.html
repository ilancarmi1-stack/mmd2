function drawInterceptors(){
  interceptors.forEach(ic=>{
    ctx.save();

    // שובל מקווקו — משתמש ב-cpx/cpy הקבועים
    ctx.strokeStyle='rgba(80,180,255,0.85)'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
    ctx.beginPath();
    const steps=Math.floor(ic.progress*30);
    for(let s=0;s<=steps;s++){
      const t2=s/30;
      const bx=(1-t2)*(1-t2)*ic.launchX+2*(1-t2)*t2*ic.cpx+t2*t2*ic.tx;
      const by=(1-t2)*(1-t2)*ic.launchY+2*(1-t2)*t2*ic.cpy+t2*t2*ic.ty;
      s===0?ctx.moveTo(bx,by):ctx.lineTo(bx,by);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // ראש המיירט
    ctx.fillStyle='rgba(80,180,255,0.3)';
    ctx.beginPath(); ctx.arc(ic.curX,ic.curY,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#50c8ff';
    ctx.beginPath(); ctx.arc(ic.curX,ic.curY,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(ic.curX,ic.curY,2,0,Math.PI*2); ctx.fill();

    ctx.restore();
  });
}

function drawReporters(){
  reporters.forEach(r=>{
    ctx.save();
    ctx.translate(r.x, r.y);
    // Flip if going right
    if(r.dir>0) ctx.scale(-1,1);

    const s=18; // scale
    const bob=Math.sin(r.wobble)*1.5;
    ctx.strokeStyle='#333'; ctx.fillStyle='#555'; ctx.lineWidth=1.2;

    // Body (jacket)
    ctx.fillStyle='#445566'; ctx.strokeStyle='#223';
    ctx.fillRect(-s*.18,-s*.5,s*.36,s*.5);
    ctx.strokeRect(-s*.18,-s*.5,s*.36,s*.5);

    // Head
    ctx.beginPath(); ctx.arc(0,-s*.68+bob,s*.18,0,Math.PI*2);
    ctx.fillStyle='#e8d5b0'; ctx.fill(); ctx.strokeStyle='#333'; ctx.stroke();

    // Hair
    ctx.strokeStyle='#333'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,-s*.68+bob,s*.18,Math.PI,0); ctx.stroke();

    // Mic (right hand extended forward)
    ctx.strokeStyle='#333'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(s*.18,-s*.38+bob); ctx.lineTo(s*.38,-s*.3+bob); ctx.stroke();
    ctx.fillStyle='#888';
    ctx.beginPath(); ctx.arc(s*.42,-s*.28+bob,s*.07,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // Left arm down with camera remote
    ctx.beginPath(); ctx.moveTo(-s*.18,-s*.38+bob); ctx.lineTo(-s*.28,-s*.15+bob); ctx.stroke();

    // Walking legs
    const ls=Math.sin(r.wobble)*s*.18;
    ctx.lineWidth=1.3;
    ctx.beginPath(); ctx.moveTo(-s*.08,0); ctx.lineTo(-s*.12+ls,s*.38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.08,0); ctx.lineTo(s*.1-ls,s*.38); ctx.stroke();

    // Mini camera on tripod (behind reporter, smaller)
    const csx=-s*.7, csy=-s*.2+bob;
    ctx.fillStyle='rgba(60,60,80,.8)'; ctx.strokeStyle='#223'; ctx.lineWidth=.8;
    ctx.fillRect(csx-s*.14,csy-s*.08,s*.28,s*.16); ctx.strokeRect(csx-s*.14,csy-s*.08,s*.28,s*.16);
    // Lens
    ctx.beginPath(); ctx.arc(csx+s*.1,csy,s*.055,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill(); ctx.strokeStyle='#445'; ctx.stroke();
    // Red light
    ctx.fillStyle='#f03'; ctx.beginPath(); ctx.arc(csx-s*.08,csy-s*.04,s*.022,0,Math.PI*2); ctx.fill();
    // Tripod
    ctx.strokeStyle='rgba(60,60,80,.7)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(csx,csy+s*.08); ctx.lineTo(csx-s*.12,s*.38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(csx,csy+s*.08); ctx.lineTo(csx,s*.38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(csx,csy+s*.08); ctx.lineTo(csx+s*.1,s*.38); ctx.stroke();

    ctx.restore();
  });
}

function drawBonuses(){
  bonuses.forEach(b=>{
    ctx.save();
    const lifeRatio = b.life / 110;
    const alpha = lifeRatio > 0.7 ? 1 : lifeRatio / 0.7;
    // scale: pop in, then shrink gently at end
    const scale = lifeRatio > 0.85
      ? 0.5 + (1 - lifeRatio) / 0.15 * 0.6   // pop in: 0.5→1.1
      : lifeRatio < 0.25
      ? lifeRatio / 0.25                        // fade out shrink
      : 1.05;

    ctx.globalAlpha = alpha;
    ctx.translate(b.x, b.y);
    ctx.scale(scale, scale);

    const sz = Math.round(W * 0.072);
    ctx.font = `bold ${sz}px Courier New`;
    ctx.textAlign = 'center';

    if(b.kind === 'cat'){
      // חתול — סגול בוהק עם הילה רחבה
      ctx.shadowColor = '#cc44ff';
      ctx.shadowBlur = 28 + Math.sin(Date.now()*0.012)*8;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 5;
      ctx.strokeText(b.text, 0, 0);
      ctx.fillStyle = '#cc44ff';
      ctx.fillText(b.text, 0, 0);
      // ניצוצות סגולים
      ctx.shadowBlur = 0;
      for(let i=0;i<3;i++){
        const angle = (Date.now()*0.008 + i*2.1) % (Math.PI*2);
        const r = sz * 0.7;
        ctx.globalAlpha = alpha * (0.5 + Math.sin(angle*2)*0.3);
        ctx.fillStyle = '#ee88ff';
        ctx.font = `${Math.round(sz*0.32)}px serif`;
        ctx.fillText('✦', Math.cos(angle)*r, Math.sin(angle)*r*0.5 - sz*0.2);
      }
      ctx.globalAlpha = alpha;

    } else if(b.kind === 'dog'){
      // כלב — כתום/חום עם הילה חמה
      ctx.shadowColor = '#e07020';
      ctx.shadowBlur = 16;
      ctx.strokeStyle = 'rgba(255,240,200,0.85)';
      ctx.lineWidth = 4;
      ctx.font = `bold ${sz}px Courier New`;
      ctx.strokeText(b.text, 0, 0);
      ctx.fillStyle = '#e07020';
      ctx.fillText(b.text, 0, 0);

    } else if(b.kind === 'vulnerable'){
      // כיסא גלגלים / הליכון — כחול עם מסגרת
      ctx.shadowColor = '#2288dd';
      ctx.shadowBlur = 20;
      // תיבת רקע קטנה
      const tw = sz * 2.2, th = sz * 1.1;
      ctx.fillStyle = 'rgba(20,60,120,0.65)';
      ctx.beginPath(); ctx.roundRect(-tw/2, -th*0.85, tw, th, 6); ctx.fill();
      ctx.strokeStyle = '#66bbff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(-tw/2, -th*0.85, tw, th, 6); ctx.stroke();
      ctx.shadowBlur = 14;
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 3;
      ctx.strokeText(b.text, 0, 0);
      ctx.fillStyle = '#66ccff';
      ctx.fillText(b.text, 0, 0);

    } else {
      // ברירת מחדל
      ctx.shadowColor = b.color || '#e09010';
      ctx.shadowBlur = 18;
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 4;
      ctx.strokeText(b.text, 0, 0);
      ctx.fillStyle = b.color || '#e09010';
      ctx.fillText(b.text, 0, 0);
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

function drawThreats(){
  threats.forEach(t=>{
    // Penetrator: pulsing red halo
    if(t.isPenetrator){
      ctx.save();
      ctx.globalAlpha=0.18+0.14*Math.abs(Math.sin(frame*0.18));
      ctx.fillStyle='#ff2200';
      ctx.beginPath(); ctx.arc(t.x,t.y,22,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      ctx.restore();
    }
    // Trail — עבה וצבעוני לפי סוג
    const trailColor = t.type==='rocket'?'#f07030':
                       t.type==='cruise'?'#40a0ff':
                       t.type==='ballistic'?'#ff4488':
                       t.type==='fragment'?'#ffcc00':'#aaa';
    t.trail.forEach((pt,i)=>{
      const alpha = (t.trail.length-i)/t.trail.length * 0.28;
      const r = 3.5 - i*0.06;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = trailColor;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,Math.max(0.5,r),0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.save();

    if(t.type==='cruise'){
      // ── כתב"מ: מסתובב לפי כיוון תנועה ──
      ctx.translate(t.x, t.y);
      const cruiseAng = t.vy ? Math.atan2(t.vy, t.vx) : 0;
      ctx.rotate(cruiseAng);
      // Speed lines
      ctx.strokeStyle='rgba(64,160,255,.35)'; ctx.lineWidth=1.2; ctx.setLineDash([5,4]);
      [0,-8,8].forEach(dy=>{
        ctx.beginPath(); ctx.moveTo(-40,dy); ctx.lineTo(-22,dy); ctx.stroke();
      });
      ctx.setLineDash([]);
      // Round engine (rear)
      ctx.fillStyle='#555'; ctx.strokeStyle='#333'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(-26,0,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
      // Body
      ctx.fillStyle='#444';
      ctx.fillRect(-22,-8,40,16);
      ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(-22,-8,40,16);
      // Detail lines
      ctx.strokeStyle='#777'; ctx.lineWidth=.6;
      ctx.beginPath(); ctx.moveTo(-18,-3); ctx.lineTo(12,-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-18,3); ctx.lineTo(12,3); ctx.stroke();
      // Front delta fins
      ctx.fillStyle='#333';
      ctx.beginPath(); ctx.moveTo(18,-8); ctx.lineTo(18,8); ctx.lineTo(30,0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(10,-8); ctx.lineTo(18,-8); ctx.lineTo(18,-16); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(10,8); ctx.lineTo(18,8); ctx.lineTo(18,16); ctx.closePath(); ctx.fill();
      // Exhaust
      ctx.fillStyle=`rgba(64,160,255,${0.7+Math.sin(frame*.6)*.25})`;
      ctx.beginPath(); ctx.ellipse(-36,0,8+Math.sin(frame*.8)*3,5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(frame*.9)*.15})`;
      ctx.beginPath(); ctx.ellipse(-38,0,4,3,0,0,Math.PI*2); ctx.fill();

    } else if(t.type==='ballistic'){
      // ── בליסטי: גוף ענק, כנפי דלתא גדולות ──
      ctx.translate(t.x, t.y);
      const ang=Math.atan2(t.vy,t.vx)+Math.PI/2;
      ctx.rotate(ang);
      ctx.fillStyle='#223'; ctx.strokeStyle='#111'; ctx.lineWidth=1.2;
      ctx.fillRect(-11,-26,22,42);
      ctx.strokeRect(-11,-26,22,42);
      // Nose
      ctx.fillStyle='#112';
      ctx.beginPath(); ctx.moveTo(-11,-26); ctx.lineTo(11,-26); ctx.lineTo(0,-46); ctx.closePath(); ctx.fill();
      // Big delta wings
      ctx.fillStyle='#334';
      ctx.beginPath(); ctx.moveTo(-11,10); ctx.lineTo(-28,24); ctx.lineTo(-11,24); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(11,10); ctx.lineTo(28,24); ctx.lineTo(11,24); ctx.closePath(); ctx.fill();
      // Panel lines
      ctx.strokeStyle='#445'; ctx.lineWidth=.7;
      ctx.beginPath(); ctx.moveTo(-8,-22); ctx.lineTo(-8,14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8,-22); ctx.lineTo(8,14); ctx.stroke();
      // Exhaust
      ctx.fillStyle=`rgba(255,80,20,${0.75+Math.sin(frame*.7)*.2})`;
      ctx.beginPath(); ctx.ellipse(0,26,7,12+Math.sin(frame*.6)*4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,200,50,${0.5+Math.sin(frame*.9)*.2})`;
      ctx.beginPath(); ctx.ellipse(0,28,4,7,0,0,Math.PI*2); ctx.fill();

    } else if(t.type==='short'){
      // ── קצר: גוף מגושם, סנפירים קצרים ──
      ctx.translate(t.x, t.y);
      const ang=Math.atan2(t.vy,t.vx)+Math.PI/2;
      ctx.rotate(ang);
      ctx.fillStyle='#336'; ctx.strokeStyle='#224'; ctx.lineWidth=1.2;
      ctx.fillRect(-8,-14,16,24);
      ctx.strokeRect(-8,-14,16,24);
      ctx.beginPath(); ctx.moveTo(-8,-14); ctx.lineTo(8,-14); ctx.lineTo(0,-28); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#447';
      ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(-16,16); ctx.lineTo(-8,16); ctx.fill();
      ctx.beginPath(); ctx.moveTo(8,8); ctx.lineTo(16,16); ctx.lineTo(8,16); ctx.fill();
      ctx.fillStyle=`rgba(180,80,255,${0.65+Math.sin(frame*.5)*.25})`;
      ctx.beginPath(); ctx.ellipse(0,18,5,9+Math.sin(frame*.5)*3,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(220,180,255,${0.4+Math.sin(frame*.8)*.15})`;
      ctx.beginPath(); ctx.ellipse(0,20,3,5,0,0,Math.PI*2); ctx.fill();

    } else if(t.type==='fragment'){
      // ── שבר: משולש מסתובב ──
      ctx.translate(t.x, t.y);
      ctx.rotate(t.rotAngle||0);
      ctx.fillStyle='#556'; ctx.strokeStyle='#334'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,-11); ctx.lineTo(8,8); ctx.lineTo(-8,8); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle='#778'; ctx.lineWidth=.7;
      ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(0,5); ctx.stroke();

    } else if(t.type==='rocket'){
      // ── רקטה: גוף עגול-ראש גדול, מנוע בוהק ──
      ctx.translate(t.x, t.y);
      const ang=Math.atan2(t.vy,t.vx)+Math.PI/2;
      ctx.rotate(ang);
      ctx.fillStyle='#511'; ctx.strokeStyle='#311'; ctx.lineWidth=1.2;
      ctx.fillRect(-9,-18,18,30); ctx.strokeRect(-9,-18,18,30);
      ctx.beginPath(); ctx.arc(0,-18,9,Math.PI,0); ctx.fill(); ctx.stroke();
      // Rear fins
      ctx.fillStyle='#622';
      ctx.beginPath(); ctx.moveTo(-9,10); ctx.lineTo(-20,20); ctx.lineTo(-9,20); ctx.fill();
      ctx.beginPath(); ctx.moveTo(9,10); ctx.lineTo(20,20); ctx.lineTo(9,20); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-4,12); ctx.lineTo(-4,22); ctx.lineTo(4,22); ctx.lineTo(4,12); ctx.fill();
      // Bright exhaust
      ctx.fillStyle=`rgba(255,160,20,${0.85+Math.sin(frame*.8)*.1})`;
      ctx.beginPath(); ctx.ellipse(0,26,8,12+Math.sin(frame*.7)*5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,240,80,${0.6+Math.sin(frame*.9)*.2})`;
      ctx.beginPath(); ctx.ellipse(0,29,4,7,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawDebris(){
  debris.forEach(d=>{
    ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(d.rot);
    ctx.globalAlpha=Math.min(1,d.life/25);
    ctx.fillStyle='#c8c8be'; ctx.fillRect(-d.w/2,-d.h/2,d.w,d.h);
    ctx.strokeStyle='#999'; ctx.lineWidth=.8; ctx.strokeRect(-d.w/2,-d.h/2,d.w,d.h);
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawParticles(){
  particles.forEach(p=>{
    const sz=p.size||4;
    ctx.globalAlpha=Math.min(1, p.life/20);
    ctx.fillStyle=p.color;
    if(p.size){
      // Flash ring
      ctx.beginPath(); ctx.arc(p.x,p.y,sz,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);
    }
  });
  ctx.globalAlpha=1;
}

function drawTrail(){
  if(trail.length<2) return;
  ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); trail.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y)); ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=2;
  ctx.beginPath(); trail.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y)); ctx.stroke();
}

function drawRuinLeft(){
  const b=LEFT_BLD;
  // Seeded random for consistent chunks
  function sr(seed){ let x=Math.sin(seed)*43758.5453; return x-Math.floor(x); }

  // Main rubble mound
  ctx.fillStyle='#d8d5cc';
  ctx.beginPath();
  ctx.moveTo(b.x-18,GY);
  ctx.lineTo(b.x-4,GY-b.h*.38);
  ctx.lineTo(b.x+b.w*.22,GY-b.h*.55);
  ctx.lineTo(b.x+b.w*.48,GY-b.h*.42);
  ctx.lineTo(b.x+b.w*.7,GY-b.h*.48);
  ctx.lineTo(b.x+b.w+18,GY);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#bbb'; ctx.lineWidth=.6; ctx.stroke();

  // Secondary rubble layer (darker)
  ctx.fillStyle='#ccc9c0';
  ctx.beginPath();
  ctx.moveTo(b.x-8,GY);
  ctx.lineTo(b.x+b.w*.1,GY-b.h*.28);
  ctx.lineTo(b.x+b.w*.35,GY-b.h*.2);
  ctx.lineTo(b.x+b.w*.65,GY-b.h*.25);
  ctx.lineTo(b.x+b.w+8,GY);
  ctx.closePath(); ctx.fill();

  // Scattered small concrete chunks (seeded so consistent)
  const chunks=[
    [b.x-12,GY-18,14,8,0.3],  [b.x+4,GY-28,9,6,-0.5],
    [b.x+b.w*.15,GY-42,12,7,0.8], [b.x+b.w*.3,GY-22,8,5,-0.2],
    [b.x+b.w*.5,GY-35,10,6,0.6],  [b.x+b.w*.65,GY-18,7,5,-0.7],
    [b.x+b.w*.8,GY-30,11,7,0.4],  [b.x+b.w+4,GY-20,9,5,-0.3],
    [b.x+b.w*.25,GY-55,7,4,1.1],  [b.x+b.w*.55,GY-48,8,5,-0.9],
    [b.x-5,GY-8,6,4,0.6],   [b.x+b.w*.45,GY-14,5,4,-0.4],
  ];
  chunks.forEach(([cx2,cy2,cw,ch,rot],i)=>{
    ctx.save(); ctx.translate(cx2,cy2); ctx.rotate(rot);
    ctx.fillStyle=`hsl(0,0%,${74+sr(i*7)*12}%)`;
    ctx.strokeStyle=`hsl(0,0%,${58+sr(i*7)*10}%)`;
    ctx.lineWidth=.7;
    ctx.fillRect(-cw/2,-ch/2,cw,ch); ctx.strokeRect(-cw/2,-ch/2,cw,ch);
    // Crack on chunk
    ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=.5; ctx.setLineDash([2,1]);
    ctx.beginPath(); ctx.moveTo(-cw*.3,-ch*.2); ctx.lineTo(cw*.3,ch*.3); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // Broken wall stub (one remaining)
  ctx.fillStyle='#dbd8cf'; ctx.strokeStyle='#999'; ctx.lineWidth=1.2;
  ctx.fillRect(b.x+b.w*.18,GY-b.h*.32,b.w*.28,b.h*.32);
  ctx.strokeRect(b.x+b.w*.18,GY-b.h*.32,b.w*.28,b.h*.32);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=.8; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(b.x+b.w*.24,GY-b.h*.3); ctx.lineTo(b.x+b.w*.2,GY-b.h*.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.x+b.w*.36,GY-b.h*.28); ctx.lineTo(b.x+b.w*.38,GY-b.h*.1); ctx.stroke();
  ctx.setLineDash([]);

  // Tiny dust particles (static visual)
  for(let i=0;i<8;i++){
    const dx=b.x+sr(i*13)*b.w, dy=GY-sr(i*17)*b.h*.4;
    ctx.fillStyle=`rgba(180,175,165,${sr(i*11)*.25})`;
    ctx.beginPath(); ctx.arc(dx,dy,sr(i*19)*4+2,0,Math.PI*2); ctx.fill();
  }
}

function drawRuinRight(){
  const b=RIGHT_BLD;
  function sr(seed){ let x=Math.sin(seed)*43758.5453; return x-Math.floor(x); }

  // Maamad tower — unchanged, drawn first
  const mtwx=b.x+b.w*.32, mtww=b.w*.36, mtwh=b.h*.88;
  ctx.fillStyle='rgba(10,90,40,.09)'; ctx.fillRect(mtwx,GY-mtwh,mtww,mtwh);
  ctx.strokeStyle='#1a6432'; ctx.lineWidth=2.5; ctx.strokeRect(mtwx,GY-mtwh,mtww,mtwh);
  for(let f=1;f<4;f++){
    ctx.strokeStyle='rgba(26,100,50,.3)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(mtwx,GY-mtwh+mtwh*f/4); ctx.lineTo(mtwx+mtww,GY-mtwh+mtwh*f/4); ctx.stroke();
  }
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(mtwx+mtww/2,GY-mtwh-H*.06); ctx.lineTo(mtwx+mtww/2,GY-mtwh+2); ctx.stroke();
  ctx.fillStyle='#1a6432';
  ctx.beginPath(); ctx.moveTo(mtwx+mtww/2,GY-mtwh-H*.055); ctx.lineTo(mtwx+mtww/2+W*.07,GY-mtwh-H*.033); ctx.lineTo(mtwx+mtww/2,GY-mtwh-H*.012); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(mtww*.18)}px Courier New`; ctx.textAlign='center';
  ctx.fillText('ממ"ד',mtwx+mtww/2,GY-mtwh*.55);
  // Saved people inside tower
  persons.filter(p=>p.saved&&p.shelter==='maamad').forEach((p,i)=>{
    const cols=Math.max(1,Math.floor((mtww-8)/12));
    if(p.kind==='dog'||p.kind==='cat') miniAnimal(ctx,mtwx+5+(i%cols)*12,GY-mtwh+mtwh-8-Math.floor(i/cols)*16,p.color,p.kind);
    else miniStick(ctx,mtwx+5+(i%cols)*12,GY-mtwh+mtwh-8-Math.floor(i/cols)*16,p.color);
  });

  // ── Rubble on LEFT side of tower ──
  ctx.fillStyle='#d8d5cc';
  ctx.beginPath();
  ctx.moveTo(b.x-22,GY); ctx.lineTo(b.x+b.w*.08,GY-b.h*.32);
  ctx.lineTo(b.x+b.w*.18,GY-b.h*.18); ctx.lineTo(mtwx,GY);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#bbb'; ctx.lineWidth=.5; ctx.stroke();

  // ── Rubble on RIGHT side of tower ──
  ctx.fillStyle='#d8d5cc';
  ctx.beginPath();
  ctx.moveTo(mtwx+mtww,GY); ctx.lineTo(b.x+b.w*.78,GY-b.h*.2);
  ctx.lineTo(b.x+b.w*.88,GY-b.h*.3); ctx.lineTo(b.x+b.w+22,GY);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#bbb'; ctx.lineWidth=.5; ctx.stroke();

  // Small chunks — scattered on both sides of tower
  const leftChunks=[
    [b.x-10,GY-14,12,7,0.5],  [b.x+b.w*.05,GY-26,9,6,-0.4],
    [b.x+b.w*.12,GY-38,10,6,0.9], [mtwx-14,GY-20,8,5,-0.6],
    [b.x+b.w*.08,GY-12,6,4,0.3],  [mtwx-24,GY-10,7,5,1.0],
    [b.x-4,GY-32,8,5,-0.8],
  ];
  const rightChunks=[
    [mtwx+mtww+8,GY-18,12,7,-0.4],  [b.x+b.w*.8,GY-30,9,6,0.5],
    [b.x+b.w*.9,GY-16,10,7,-0.7],   [b.x+b.w+6,GY-22,8,5,0.8],
    [mtwx+mtww+22,GY-10,7,4,-0.3],  [b.x+b.w*.75,GY-42,9,5,0.6],
    [b.x+b.w+14,GY-12,6,4,-0.9],
  ];
  [...leftChunks,...rightChunks].forEach(([cx2,cy2,cw,ch,rot],i)=>{
    ctx.save(); ctx.translate(cx2,cy2); ctx.rotate(rot);
    ctx.fillStyle=`hsl(0,0%,${73+sr(i*7+5)*13}%)`;
    ctx.strokeStyle=`hsl(0,0%,${56+sr(i*7+5)*10}%)`;
    ctx.lineWidth=.7;
    ctx.fillRect(-cw/2,-ch/2,cw,ch); ctx.strokeRect(-cw/2,-ch/2,cw,ch);
    ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=.5; ctx.setLineDash([2,1]);
    ctx.beginPath(); ctx.moveTo(-cw*.25,-ch*.2); ctx.lineTo(cw*.35,ch*.25); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // Dust puffs on both sides
  for(let i=0;i<6;i++){
    const isLeft=i<3;
    const dx=isLeft ? b.x+sr(i*13)*(mtwx-b.x) : mtwx+mtww+sr(i*13)*(b.x+b.w-mtwx-mtww);
    const dy=GY-sr(i*17)*b.h*.35;
    ctx.fillStyle=`rgba(180,175,165,${sr(i*11)*.22})`;
    ctx.beginPath(); ctx.arc(dx,dy,sr(i*19)*5+2,0,Math.PI*2); ctx.fill();
  }
}

function drawHUD(){
  const saved=persons.filter(p=>p.saved).length;
  const cx=W/2;
  const elapsed=frame/60;
  const remaining=Math.max(0,20-elapsed);
  const progress=Math.min(1, elapsed/60);

  const catsSaved = persons.filter(p=>p.saved&&p.kind==='cat').length;
  const dogsSaved = persons.filter(p=>p.saved&&p.kind==='dog').length;
  const vulnSaved = persons.filter(p=>p.saved&&(p.kind==='wheelchair'||p.kind==='walker')).length;
  const scoreVal = saved + catsSaved*9 + dogsSaved*3 + vulnSaved*4;

  // ── ניקוד — מספר גדול במרכז עליון בלבד ──
  const numSize = Math.round(Math.min(W,H)*0.11);
  const sbY = 6;

  // הילה עדינה מאחורה
  ctx.fillStyle='rgba(0,0,0,0.55)';
  const pad=numSize*0.35;
  ctx.beginPath();
  ctx.roundRect(cx - numSize - pad, sbY, (numSize+pad)*2, numSize*1.15, 8);
  ctx.fill();

  // מספר לבן גדול
  ctx.fillStyle='#ffffff';
  ctx.font=`bold ${numSize}px Courier New`;
  ctx.textAlign='center';
  ctx.fillText(String(scoreVal), cx, sbY + numSize*0.92);

  // ── איום — ימין עליון ──
  ctx.textAlign='right';
  ctx.font=`bold ${Math.round(W*0.024)}px Courier New`;
  const tColor=threats.length>0?'#ef4444':threatSchedule.length>0?'#f97316':'#22c55e';
  ctx.fillStyle=tColor;
  const tLabel=threats.length>0?'⚠ איום!':threatSchedule.length>0?'⚠ בדרך':'✓ שקט';
  ctx.fillText(tLabel, W-10, sbY+numSize*0.85);

  // ── סרגל זמן ──
  const barH=Math.round(H*0.030);
  const barW=W*0.88, barX=(W-barW)/2;
  const barY=GY+(H-GY)*0.50;
  const r=barH/2;

  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,r); ctx.fill();

  const timeColor = remaining<5?'#e84040': remaining<10?'#f5a623':'#1a6432';
  ctx.fillStyle=timeColor;
  ctx.beginPath(); ctx.roundRect(barX,barY,barW*progress,barH,r); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.20)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,r); ctx.stroke();

  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.font=`bold ${Math.round(barH*0.78)}px Courier New`;
  ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(remaining)}″`, cx, barY+barH*0.80);

  // ── End game ──
  if(frame >= 20*60+10 && gs==="playing") showResult("time");
}

// ── Result screen ──
let replayBtn=null;

function showResult(reason){
  if(gs==='result') return;
  gs='result';
  replayBtn=null;
  // שמור שיא
  const catsSavedHS = persons.filter(p=>p.saved&&p.kind==='cat').length;
  const dogsSavedHS = persons.filter(p=>p.saved&&p.kind==='dog').length;
  const vulnSavedHS = persons.filter(p=>p.saved&&(p.kind==='wheelchair'||p.kind==='walker')).length;
  const savedHS = persons.filter(p=>p.saved).length;
  const finalScore = savedHS + catsSavedHS*9 + dogsSavedHS*3 + vulnSavedHS*4;
  if(finalScore > highScore){
    highScore = finalScore;
    try{ localStorage.setItem('maamad_highscore', String(highScore)); }catch(e){}
  }
  document.getElementById('result-overlay').style.display='block';
  drawResult(reason);
}

// ── Unified canvas input ──
function handleDown(px,py){
  if(gs==='playing') onDown({x:px,y:py});
}
function handleMove(px,py){
  if(gs==='playing') onMove({x:px,y:py});
}
function handleUp(px,py){
  if(gs==='playing'){
    onUp({x:px,y:py});
  } else if(gs==='result'&&replayBtn){
    if(px>replayBtn.x&&px<replayBtn.x+replayBtn.w&&py>replayBtn.y&&py<replayBtn.y+replayBtn.h)
      startGame();
  }
}

function cpos(e,touch){
  const r=C.getBoundingClientRect();
  const src=touch?e.changedTouches[0]:e;
  return {x:src.clientX-r.left, y:src.clientY-r.top};
}

C.addEventListener('mousedown', e=>{ const p=cpos(e); handleDown(p.x,p.y); });
C.addEventListener('mousemove', e=>{ const p=cpos(e); handleMove(p.x,p.y); });
C.addEventListener('mouseup',   e=>{ const p=cpos(e); handleUp(p.x,p.y); });
C.addEventListener('touchstart',e=>{ e.preventDefault(); const p=cpos(e,true); handleDown(p.x,p.y); },{passive:false});
C.addEventListener('touchmove', e=>{ e.preventDefault(); const p=cpos(e,true); handleMove(p.x,p.y); },{passive:false});
C.addEventListener('touchend',  e=>{ e.preventDefault(); const p=cpos(e,true); handleUp(p.x,p.y); },{passive:false});

function drawTVReporter(cx, cy, scale){
  // cx,cy = center, scale = size factor
  const s=scale;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle='#fff'; ctx.fillStyle='#fff'; ctx.lineWidth=1.3;

  // Body (suit jacket — rectangle)
  ctx.fillStyle='#ccc'; ctx.strokeStyle='#fff';
  ctx.fillRect(-s*.18,-s*.18,s*.36,s*.45);
  ctx.strokeRect(-s*.18,-s*.18,s*.36,s*.45);
  // Tie
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-s*.18); ctx.lineTo(-s*.06,s*.14); ctx.lineTo(0,s*.2); ctx.lineTo(s*.06,s*.14); ctx.closePath(); ctx.stroke();

  // Head
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.arc(0,-s*.32,s*.17,0,Math.PI*2); ctx.fillStyle='#eee'; ctx.fill(); ctx.stroke();
  // Hair
  ctx.strokeStyle='#888'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(0,-s*.32,s*.17,Math.PI,0); ctx.stroke();
  // Eyes
  ctx.fillStyle='#444';
  ctx.beginPath(); ctx.arc(-s*.06,-s*.35,s*.025,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*.06,-s*.35,s*.025,0,Math.PI*2); ctx.fill();

  // Arms
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1.3;
  // Left arm down
  ctx.beginPath(); ctx.moveTo(-s*.18,0); ctx.lineTo(-s*.26,s*.22); ctx.stroke();
  // Right arm holding mic up
  ctx.beginPath(); ctx.moveTo(s*.18,0); ctx.lineTo(s*.28,-s*.08); ctx.stroke();

  // Legs
  ctx.beginPath(); ctx.moveTo(-s*.08,s*.27); ctx.lineTo(-s*.1,s*.52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*.08,s*.27); ctx.lineTo(s*.1,s*.52); ctx.stroke();

  // Microphone (right hand)
  ctx.strokeStyle='#fff'; ctx.fillStyle='#999'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(s*.32,-s*.14,s*.07,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Mic handle
  ctx.beginPath(); ctx.moveTo(s*.32,-s*.07); ctx.lineTo(s*.28,s*.08); ctx.stroke();
  // "MIC" label dot
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(s*.32,-s*.14,s*.025,0,Math.PI*2); ctx.fill();

  // Camera on tripod (to the left of reporter)
  const cx2=-s*.72, cy2=s*.1;
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.fillStyle='rgba(200,200,200,.5)';
  // Camera body
  ctx.fillRect(cx2-s*.18,cy2-s*.1,s*.36,s*.22); ctx.strokeRect(cx2-s*.18,cy2-s*.1,s*.36,s*.22);
  // Lens
  ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx2+s*.14,cy2,s*.07,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx2+s*.14,cy2,s*.04,0,Math.PI*2); ctx.fill();
  // Red recording light
  ctx.fillStyle='#f03030';
  ctx.beginPath(); ctx.arc(cx2-s*.1,cy2-s*.06,s*.025,0,Math.PI*2); ctx.fill();
  // Tripod legs
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx2,cy2+s*.12); ctx.lineTo(cx2-s*.15,cy2+s*.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx2,cy2+s*.12); ctx.lineTo(cx2,cy2+s*.52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx2,cy2+s*.12); ctx.lineTo(cx2+s*.15,cy2+s*.5); ctx.stroke();
  // Lens pointing at reporter (small arrow line)
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=.8; ctx.setLineDash([2,3]);
  ctx.beginPath(); ctx.moveTo(cx2+s*.21,cy2); ctx.lineTo(-s*.28,cy2); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

function buildReport(reason, saved, total, inMaamad, inShelter, dead, animals, pct){
  const survived=pct===100?'כולם ניצלו':pct>=80?'רוב הדיירים ניצלו':pct>=50?'כמחצית הדיירים ניצלו':'מיעוט הדיירים ניצל';
  const lines=[];
  if(reason==='hit'){
    lines.push('דיווח מיוחד: בניין נפגע ישירות ממטח רקטות');
  } else if(reason==='animals'){
    lines.push('דיווח מיוחד: מרחב מוגן התפוצץ מעומס חיות!');
  } else {
    lines.push('סיום אירוע: האזעקה הסתיימה');
  }
  lines.push(`${survived} — ${saved} מתוך ${total} אנשים`);
  if(inMaamad>0) lines.push(`${inMaamad} מוגנים בממ"ד`);
  if(inShelter>0) lines.push(`${inShelter} מוגנים במקלט`);
  if(dead>0)      lines.push(`${dead} נפגעו`);
  if(animals>0)   lines.push(`${animals} חיות הוצלו — בונוס נקודות`);
  return lines;
}

function drawResult(reason){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  const saved    = persons.filter(p=>p.saved).length;
  const total    = persons.length;
  const pct      = Math.round(saved/total*100);
  const catsSavedR = persons.filter(p=>p.saved&&p.kind==='cat').length;
  const dogsSavedR = persons.filter(p=>p.saved&&p.kind==='dog').length;
  const vulnSavedR = persons.filter(p=>p.saved&&(p.kind==='wheelchair'||p.kind==='walker'||p.kind==='pregnant')).length;
  const totalScore = saved + catsSavedR*9 + dogsSavedR*3 + vulnSavedR*3;
  const cx=W/2;

  const gradeColor = pct>=80?'#1a6432':pct>=60?'#444':pct>=40?'#b07000':'#b02010';
  const grade = pct===100?'A+':pct>=80?'A':pct>=60?'B':pct>=40?'C':'D';
  const headline = reason==='hit'?'💥 הבניין נפגע!'
    : reason==='animals'?'💥 יותר מדי חיות!'
    : pct===100?'כולם ניצלו!':pct>=80?'עבודה מצוינת!':pct>=60?'לא רע!':pct>=40?'צריך להתאמן':'נסה שוב!';

  // ── רצועת כותרת ──
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H*0.12);
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(W*0.048)}px Courier New`;
  ctx.textAlign='center'; ctx.fillText(headline, cx, H*0.075);

  // ── ניקוד — ענק במרכז ──
  const scoreSize = Math.round(Math.min(W,H)*0.28);
  ctx.fillStyle=gradeColor;
  ctx.font=`bold ${scoreSize}px Courier New`;
  ctx.textAlign='center';
  ctx.fillText(String(totalScore), cx, H*0.52);

  // תווית "ניקוד" מעל
  ctx.fillStyle='#aaa';
  ctx.font=`${Math.round(W*0.028)}px Courier New`;
  ctx.fillText('ניקוד', cx, H*0.20);

  // ── ציון עגול ──
  const gcr=Math.round(Math.min(W,H)*0.07);
  const gcx=W*0.82, gcy=H*0.38;
  ctx.fillStyle='#fff'; ctx.strokeStyle=gradeColor; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(gcx,gcy,gcr,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=gradeColor;
  ctx.font=`bold ${Math.round(gcr*1.1)}px Courier New`;
  ctx.textAlign='center';
  ctx.fillText(grade, gcx, gcy+gcr*0.38);

  // ── שיא ──
  const isNewHS = totalScore >= highScore;
  ctx.font=`${Math.round(W*0.028)}px Courier New`;
  ctx.fillStyle = isNewHS?'#c04000':'#bbb';
  ctx.textAlign='center';
  ctx.fillText(isNewHS?'🏆 שיא חדש!': `שיא: ${highScore}`, cx, H*0.62);

  // ── כפתור ──
  const btnW=W*0.72, btnH=H*0.09, btnX=cx-btnW/2, btnY=H*0.68;
  replayBtn={x:btnX,y:btnY,w:btnW,h:btnH};
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(W*0.038)}px Courier New`;
  ctx.textAlign='center';
  ctx.fillText('מתמגנים ונהנים - שוב!', cx, btnY+btnH*0.65);
}
