<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ממ"ד</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'Courier New',monospace;}
canvas{display:block;touch-action:none;}
#overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;direction:rtl;padding:16px;}
.ot{font-size:1.3rem;font-weight:700;letter-spacing:2px;text-align:center;}
.os{font-size:0.72rem;color:#444;text-align:center;line-height:2;letter-spacing:.4px;}
#btn{padding:11px 32px;background:#111;border:none;color:#fff;font-family:'Courier New',monospace;font-size:0.82rem;letter-spacing:2px;cursor:pointer;border-radius:2px;}
#btn:active{opacity:.7;}
/* במצב רוחבי — הקטן את הכיתוב ואת ה-demo canvas */
@media (orientation:landscape) and (max-height:500px){
  #dc{width:260px;height:60px;}
  .os{font-size:0.62rem;line-height:1.6;}
  #btn{padding:10px 28px;font-size:0.78rem;}
  #overlay{gap:6px;padding:10px;}
}
/* safe area למכשירים עם notch */
body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <canvas id="dc" width="380" height="90"></canvas>
  <div class="os">
    עזרו לאנשים ולחיות להיכנס למרחבים המוגנים<br>
    גרור אנשים לממ"ד בקומתם · חיות — תזז ותפוס<br>
    בניין שמאל ורחוב — גרור למקלט · 60 שניות!
  </div>
  <button id="btn" onclick="startGame()" style="padding:16px 48px;font-size:1.1rem;letter-spacing:3px;">מתמגנים ונהנים!</button>
</div>
<div id="result-overlay" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:16px;text-align:center;background:transparent;pointer-events:none;">
  <button onclick="startGame()" style="padding:18px 56px;font-size:1.15rem;letter-spacing:2px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:Courier New,monospace;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:all;">מתמגנים ונהנים - שוב!</button>
</div>

<script>
const C=document.getElementById('c'), ctx=C.getContext('2d');
let W,H;
function resize(){ W=window.innerWidth; H=window.innerHeight; C.width=W; C.height=H; }
resize();
window.addEventListener('resize',()=>{ resize(); if(gs==='playing') layout(); });

// ── World ──
let GY,
    RIGHT_BLD, LEFT_BLD, SHELTER, MAAMAD_FLOORS,
    persons, threats, debris, particles, interceptors, bonuses,
    drag, trail,
    gs, frame, impactFrame, impactTimer,
    streetWaveTimer, pressure,
    destroyedLeft, destroyedRight,
    score, interceptTimer,
    shakeFrame, shakeAmt,
    reporters;

// ── שיא ──
let highScore = 0;
try { highScore = parseInt(localStorage.getItem('maamad_highscore')||'0')||0; } catch(e){}

// ── Web Audio ──
const AC = (() => {
  try { return new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; }
})();

function unlockAudio(){
  if(AC && AC.state==='suspended') AC.resume();
}
document.addEventListener('click', unlockAudio, {once:true});
document.addEventListener('touchend', unlockAudio, {once:true});

function beep(freq, dur, type='square', vol=0.18, delay=0){
  if(!AC) return;
  const t=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+dur+0.01);
}

// ── Ambient footstep sounds — quiet shuffle rhythm ──
let ambientTimer=0;
let savedSoundCooldown=0;

function playAmbient(){
  if(!AC) return;
  ambientTimer++;
  savedSoundCooldown=Math.max(0,savedSoundCooldown-1);

  // ── Footsteps: different rhythms per person type ──
  // Fast children (every 10f), normal adults (every 16f), elderly/walker (every 26f)
  const moving = persons.filter(p=>!p.saved&&!p.dead&&!p.dragging&&p.auto);
  const hasFast   = moving.some(p=>p.kind==='child-boy'||p.kind==='child-boy2'||p.kind==='child-girl');
  const hasNormal = moving.some(p=>p.kind==='man'||p.kind==='elderly-f-skirt'||p.kind==='elderly-f-dress');
  const hasSlow   = moving.some(p=>p.kind==='walker'||p.kind==='wheelchair'||p.kind==='pregnant');

  // Children — quick patter
  if(hasFast && ambientTimer%10===0){
    const t=AC.currentTime;
    const buf=AC.createBuffer(1,AC.sampleRate*0.025,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25))*0.7;
    const src=AC.createBufferSource(), g=AC.createGain();
    src.buffer=buf; g.gain.setValueAtTime(0.05,t);
    src.connect(g); g.connect(AC.destination); src.start(t);
  }
  // Adults — steady walk
  if(hasNormal && ambientTimer%16===0){
    const t=AC.currentTime;
    const buf=AC.createBuffer(1,AC.sampleRate*0.04,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
    const src=AC.createBufferSource(), g=AC.createGain();
    src.buffer=buf; g.gain.setValueAtTime(0.038,t);
    src.connect(g); g.connect(AC.destination); src.start(t);
  }
  // Walker / wheelchair — slow clunk with metallic tap
  if(hasSlow && ambientTimer%26===0){
    const t=AC.currentTime;
    // Metallic frame tap
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(380,t);
    g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.09);
    // Rubber foot thud
    const buf=AC.createBuffer(1,AC.sampleRate*0.06,AC.sampleRate);
    const dd=buf.getChannelData(0);
    for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1)*Math.exp(-i/(dd.length*0.2))*0.5;
    const src=AC.createBufferSource(), g2=AC.createGain();
    src.buffer=buf; g2.gain.setValueAtTime(0.04,t+0.02);
    src.connect(g2); g2.connect(AC.destination); src.start(t+0.02);
  }

  // ── Crowd murmur ──
  if(ambientTimer%200===0){
    const t=AC.currentTime;
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(160+Math.random()*50,t);
    g.gain.setValueAtTime(0.015,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+1.6);
  }

  // ── Play saved-person sound when count rises ──
  if(savedSoundCooldown===0){
    const nowSaved=persons.filter(p=>p.saved).length;
    if(nowSaved>0 && nowSaved%5===0) { soundSaved(); savedSoundCooldown=60; }
  }
}

// ── Saved person chime (every 5 saved) ──
function soundSaved(){
  if(!AC) return;
  [880,1100].forEach((f,i)=>beep(f, 0.08, 'sine', 0.08, i*0.09));
}

// ── Walker frame metallic clunk (on drag) ──
function soundWalker(){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(420,t);
  o.frequency.exponentialRampToValueAtTime(200,t+0.12);
  g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.15);
}

// ── Animal overflow explosion ──
function soundAnimalBoom(){
  if(!AC) return;
  // Chaotic animal sounds + boom
  soundBark(); soundMeow();
  setTimeout(soundBark, 120); setTimeout(soundMeow, 200);
  setTimeout(soundImpact, 350);
}

// ── Dog bark ──
function soundBark(){
  if(!AC) return;
  const t=AC.currentTime;
  [0, 0.18].forEach(delay=>{
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='square';
    o.frequency.setValueAtTime(220,t+delay);
    o.frequency.exponentialRampToValueAtTime(120,t+delay+0.12);
    g.gain.setValueAtTime(0.22,t+delay);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.14);
    o.connect(g); g.connect(AC.destination);
    o.start(t+delay); o.stop(t+delay+0.15);
  });
}

// ── Cat meow ──
function soundMeow(){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(500,t);
  o.frequency.linearRampToValueAtTime(800,t+0.15);
  o.frequency.linearRampToValueAtTime(600,t+0.35);
  g.gain.setValueAtTime(0.0,t);
  g.gain.linearRampToValueAtTime(0.20,t+0.08);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+0.45);
}

// Space Invaders march
let marchTimer=0, marchStep=0;
const MARCH=[160,120,100,130];
function playMarch(){
  if(!AC) return;
  marchTimer++;
  const interval=Math.max(8, 28-Math.floor(frame/120));
  if(marchTimer>=interval){
    marchTimer=0;
    beep(MARCH[marchStep%4], 0.06, 'square', 0.12);
    marchStep++;
  }
}

function soundIntercept(){
  beep(400,0.04,'square',0.15);
  beep(800,0.04,'square',0.12, 0.05);
  beep(1200,0.03,'square',0.10, 0.10);
  if(!AC) return;
  const t=AC.currentTime+0.14;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(120,t);
  o.frequency.exponentialRampToValueAtTime(20, t+0.3);
  g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+0.35);
}

function soundImpact(){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(80,t);
  o.frequency.exponentialRampToValueAtTime(15, t+0.5);
  g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+0.55);
}

function soundBonus(){
  [600,750,900].forEach((_,i)=>beep(600+i*150, 0.07, 'square', 0.13, i*0.07));
}

function soundSiren(){
  if(!AC) return;
  const notes=[392, 523, 659, 784];
  notes.forEach((freq,i)=>{
    const t=AC.currentTime+i*0.12;
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.03);
    g.gain.setValueAtTime(0.18,t+0.08);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+0.18);
    const o2=AC.createOscillator(), g2=AC.createGain();
    o2.type='square'; o2.frequency.setValueAtTime(freq*2,t);
    g2.gain.setValueAtTime(0.04,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o2.connect(g2); g2.connect(AC.destination);
    o2.start(t); o2.stop(t+0.14);
  });
}

const FLOORS = 4;
const COLORS = ['#b04010','#1840a0','#107840','#604090','#808020','#205060'];

function layout(){
  // landscape mobile: H קטן — מתאימים פרופורציות
  const isLandscape = W > H;
  GY = isLandscape ? H*0.75 : H*0.82;

  // Right building
  const rbh = isLandscape ? H*0.58 : H*0.40;
  const rbw = isLandscape ? W*0.28 : W*0.32;
  const flH = rbh/FLOORS;
  RIGHT_BLD = {
    x: W*0.62, y: GY-rbh, w: rbw, h: rbh,
    floors: FLOORS, flH,
    hasMaamad: true
  };

  // Left building — 6 קומות
  const LEFT_FLOORS = 6;
  const lbh = isLandscape ? H*0.72 : H*0.52;
  const lbw = isLandscape ? W*0.18 : W*0.22;
  LEFT_BLD = {
    x: W*0.03, y: GY-lbh, w: lbw, h: lbh,
    floors: LEFT_FLOORS, flH: lbh/LEFT_FLOORS,
    hasMaamad: false
  };

  // Underground shelter
  const sw = isLandscape ? W*0.20 : W*0.22;
  const sh = isLandscape ? H*0.14 : H*0.10;
  const stairW = isLandscape ? W*0.035 : W*0.04;
  const shelterX = isLandscape ? W*0.33 : W*0.32;
  SHELTER = {
    x: shelterX, y: GY, w: sw, h: sh,
    underground: true,
    stairX: shelterX - stairW,
    stairW: stairW,
    entryX: shelterX
  };

  // Maamad boxes per floor — from floor line, full floor height
  MAAMAD_FLOORS = [];
  for(let f=0;f<FLOORS;f++){
    const mw=RIGHT_BLD.w*0.28;
    const floorBottom = RIGHT_BLD.y + RIGHT_BLD.flH*(FLOORS-f); // קו הרצפה של הקומה
    const floorTop    = floorBottom - RIGHT_BLD.flH;
    const mh = RIGHT_BLD.flH; // גובה מלא של הקומה
    MAAMAD_FLOORS.push({
      floor: f,
      x: RIGHT_BLD.x+RIGHT_BLD.w-mw-4,
      y: floorTop,
      w: mw, h: mh,
      floorY: floorBottom // קו הרצפה לציון מיקום דמויות
    });
  }
}

// ── Person types from sketch ──
// elderly-woman-skirt, elderly-woman-dress, man, child-boy, child-boy2, child-girl, wheelchair, cat, dog
const PERSON_TYPES=[
  {kind:'elderly-f-skirt', speed:0.10, color:'#604080'},
  {kind:'elderly-f-dress',  speed:0.11, color:'#804060'},
  {kind:'man',              speed:0.22, color:'#206080'},
  {kind:'child-boy',        speed:0.40, color:'#208040'},
  {kind:'child-boy2',       speed:0.42, color:'#404020'},
  {kind:'child-girl',       speed:0.38, color:'#a03060'},
  {kind:'wheelchair',       speed:0.06, color:'#505090'},
  {kind:'cat',              speed:0,    color:'#806020'},
  {kind:'dog',              speed:0,    color:'#604020'},
  {kind:'walker',           speed:0.06, color:'#607060'},
  {kind:'pregnant',          speed:0.09, color:'#a06040'},
];

function pickTypes(n, forceCats, forceDogs){
  const base=[];
  const human=PERSON_TYPES.filter(t=>t.kind!=='cat'&&t.kind!=='dog');
  for(let i=0;i<(forceCats||0);i++) base.push(PERSON_TYPES.find(t=>t.kind==='cat'));
  for(let i=0;i<(forceDogs||0);i++) base.push(PERSON_TYPES.find(t=>t.kind==='dog'));
  while(base.length<n) base.push(human[Math.floor(Math.random()*human.length)]);
  return base.slice(0,n).sort(()=>Math.random()-.5);
}

// ── Spawn persons ──
// RIGHT BUILDING: 6 per floor × 4 floors = 24
// LEFT BUILDING: 4 per floor × 2 floors = 8
// STREET: 25 now + rest in waves
function spawnPersons(){
  persons=[];

  const ADULTS_T   = [{kind:'man',color:'#206080',speed:0.22},{kind:'elderly-f-skirt',color:'#604080',speed:0.10},{kind:'elderly-f-dress',color:'#804060',speed:0.11},{kind:'walker',color:'#607060',speed:0.06},{kind:'pregnant',color:'#a06040',speed:0.09}];
  const CHILDREN_T = [{kind:'child-boy',color:'#208040',speed:0.40},{kind:'child-boy2',color:'#404020',speed:0.42},{kind:'child-girl',color:'#a03060',speed:0.38}];
  const ANIMAL_T   = [{kind:'cat',color:'#806020',speed:0},{kind:'dog',color:'#604020',speed:0}];
  const WC_T       = [{kind:'wheelchair',color:'#505090',speed:0.06}];
  const ALL_T      = [...ADULTS_T,...CHILDREN_T,...ANIMAL_T,...WC_T];

  // Core pool — גדול יותר
  const core=[];
  for(let i=0;i<30;i++) core.push({...ADULTS_T[i%ADULTS_T.length]});
  for(let i=0;i<20;i++) core.push({...CHILDREN_T[i%CHILDREN_T.length]});
  for(let i=0;i<3;i++)  core.push({...ANIMAL_T[0]});
  for(let i=0;i<4;i++)  core.push({...ANIMAL_T[1]});
  for(let i=0;i<8;i++)  core.push({...WC_T[0]});

  // Extra pool
  const extra=[];
  for(let i=0;i<80;i++) extra.push({...ALL_T[Math.floor(Math.random()*ALL_T.length)]});

  const allPool=[...core,...extra].sort(()=>Math.random()-.5);

  function makePerson(x,y,t,floor,shelter,inBld){
    const isAnimal=t.kind==='cat'||t.kind==='dog';
    return {
      id:persons.length, x, y,
      homeFloor:floor, shelter,
      color:t.color, kind:t.kind,
      saved:false,dead:false,dragging:false,
      wobble:Math.random()*Math.PI*2,
      inBuilding:inBld,
      auto:!isAnimal,
      autoSpeed:t.speed||0.22,
      animalDir:Math.random()<0.5?1:-1, animalTimer:0
    };
  }

  let pi=0;

  // RIGHT BUILDING: 5 per floor × 4 floors = 20
  // מובטח: 1 חתול ו-1 כלב בלבד בכל הבניין
  const guaranteedAnimals = [
    {...ANIMAL_T[0]}, // 1 חתול
    {...ANIMAL_T[1]}, // 1 כלב
  ].sort(()=>Math.random()-.5);
  let animalIdx=0;

  for(let f=0;f<FLOORS;f++){
    const floorY = RIGHT_BLD.y + RIGHT_BLD.flH*(FLOORS-f); // קו רצפה מדויק
    for(let i=0;i<8;i++){
      const isAnimalSlot = (i===7); // רק slot אחד לחיה, בסוף
      const t = (isAnimalSlot && f<guaranteedAnimals.length)
        ? guaranteedAnimals[f]
        : allPool[pi++]||{...ADULTS_T[0]};
      // וודא שלא שמים חיה במקום אדם אם כבר יש מספיק
      const safeT = (!isAnimalSlot && (t.kind==='cat'||t.kind==='dog')) ? {...ADULTS_T[Math.floor(Math.random()*ADULTS_T.length)]} : t;
      const spacing = (RIGHT_BLD.w - (MAAMAD_FLOORS[f]?.w||RIGHT_BLD.w*0.28) - 20) / 8;
      persons.push(makePerson(RIGHT_BLD.x+8+i*spacing, floorY, safeT, f, 'maamad', 'right'));
    }
  }

  // LEFT BUILDING: 8 per floor × 6 floors, mostly adults, 2 animals total
  const leftAnimals = [
    {...ANIMAL_T[0]},
    {...ANIMAL_T[1]},
  ].sort(()=>Math.random()-.5);
  let leftAnimalIdx=0;

  for(let f=0;f<LEFT_BLD.floors;f++){
    const floorY = LEFT_BLD.y + LEFT_BLD.flH*(LEFT_BLD.floors-f);
    const stairZoneX = LEFT_BLD.x + LEFT_BLD.w * 0.55; // תחילת אזור המדרגות
    const usableW = stairZoneX - LEFT_BLD.x - 8; // רוחב שמיש לדמויות
    const cols = 6; // מקסימום 6 בשורה כדי לא להצטופף
    const spacing = usableW / cols;
    for(let i=0;i<cols;i++){
      const t = allPool[pi++]||{...ADULTS_T[0]};
      const safeT = (t.kind==='cat'||t.kind==='dog') ? {...ADULTS_T[Math.floor(Math.random()*ADULTS_T.length)]} : t;
      const p = makePerson(LEFT_BLD.x+6+i*spacing, floorY, safeT, f, 'shelter', 'left');
      p.homeFloor = f;
      persons.push(p);
    }
    // חיה אחת לכל קומה שנייה
    if(f%2===0 && leftAnimalIdx<leftAnimals.length){
      const at = leftAnimals[leftAnimalIdx++];
      const ap = makePerson(LEFT_BLD.x+usableW*0.5, floorY, at, f, 'shelter', 'left');
      ap.homeFloor = f;
      persons.push(ap);
    }
  }

  // STREET: 20 אנשים + 10 חיות מיידית
  const minX=LEFT_BLD.x+LEFT_BLD.w+10, maxX=RIGHT_BLD.x-10;
  // 10 חיות רנדומליות
  for(let i=0;i<10;i++){
    const t=ANIMAL_T[i%2];
    persons.push({
      id:persons.length,
      x:minX+Math.random()*(maxX-minX), y:GY,
      homeFloor:-1, shelter:'shelter',
      color:t.color, kind:t.kind,
      saved:false,dead:false,dragging:false,
      wobble:Math.random()*Math.PI*2,
      inBuilding:'street',
      auto:false, autoSpeed:0,
      animalDir:Math.random()<0.5?1:-1, animalTimer:0
    });
  }
  // 20 אנשים (בוגרים בעיקר)
  const streetHumanTypes=[...ADULTS_T,...ADULTS_T,...CHILDREN_T,...WC_T];
  for(let i=0;i<20;i++){
    const t=streetHumanTypes[i%streetHumanTypes.length];
    persons.push({
      id:persons.length,
      x:minX+Math.random()*(maxX-minX), y:GY,
      homeFloor:-1, shelter:'shelter',
      color:t.color, kind:t.kind,
      saved:false,dead:false,dragging:false,
      wobble:Math.random()*Math.PI*2,
      inBuilding:'street',
      auto:true, autoSpeed:t.speed||0.28,
      animalDir:Math.random()<0.5?1:-1, animalTimer:0
    });
  }
  streetPending=0;
}

let streetPending=0;

function spawnStreetPerson(){
  const streetPeople=persons.filter(p=>p.inBuilding==='street'&&!p.saved&&!p.dead);
  // מספר מקסימלי ברחוב גדל עם מספר הניצולים
  const totalSaved=persons.filter(p=>p.saved).length;
  const maxStreet=20+Math.floor(totalSaved*1.5);
  if(streetPeople.length>=maxStreet) return;

  const streetAnimals=streetPeople.filter(p=>p.kind==='cat'||p.kind==='dog').length;
  const ADULTS_T2=[
    {kind:'man',color:'#206080',speed:0.22},
    {kind:'man',color:'#206080',speed:0.22},
    {kind:'elderly-f-skirt',color:'#604080',speed:0.10},
    {kind:'elderly-f-dress',color:'#804060',speed:0.11},
    {kind:'child-boy',color:'#208040',speed:0.40},
    {kind:'child-girl',color:'#a03060',speed:0.38},
    {kind:'walker',color:'#607060',speed:0.06},
    {kind:'pregnant',color:'#a06040',speed:0.09},
    {kind:'wheelchair',color:'#505090',speed:0.06},
    {kind:'cat',color:'#806020',speed:0},
    {kind:'dog',color:'#604020',speed:0},
  ];
  const availTypes=streetAnimals>=Math.floor(maxStreet*0.3)
    ?ADULTS_T2.filter(a=>a.kind!=='cat'&&a.kind!=='dog')
    :ADULTS_T2;
  const t=availTypes[Math.floor(Math.random()*availTypes.length)];
  const isAnimal=t.kind==='cat'||t.kind==='dog';
  const minX=LEFT_BLD.x+LEFT_BLD.w+10, maxX=RIGHT_BLD.x-10;
  persons.push({
    id:persons.length,
    x:minX+Math.random()*(maxX-minX), y:GY,
    homeFloor:-1, shelter:'shelter',
    color:t.color, kind:t.kind,
    saved:false,dead:false,dragging:false,
    wobble:Math.random()*Math.PI*2,
    inBuilding:'street',
    auto:!isAnimal, autoSpeed:t.speed||0.28,
    animalDir:Math.random()<0.5?1:-1, animalTimer:0
  });
}

// ── Threats — 4 types from sketch ──
const THREAT_DEFS = [
  // בליסטי — יורד מגובה גדול בזווית תלולה, גוף ענק
  {type:'ballistic', speed:()=>H/(32*60), label:'טיל בליסטי'},
  // קצר — נורה בזווית שטוחה מהצד השמאלי, מסתובב ופוגע
  {type:'short',     speed:()=>H/(26*60), label:'טיל קצר'},
  // רקטה — מגיחה מהצד, קשת רחבה לאורך כל המסך
  {type:'rocket',    speed:()=>H/(24*60), label:'רקטה'},
  // כתב"מ — טיסה אופקית גבוהה, צולל בחצי השני
  {type:'cruise',    speed:()=>W/(30*60), label:'כתב"מ', fromSide:true},
  {type:'cruise',    speed:()=>W/(24*60), label:'כתב"מ מהיר', fromSide:true},
];

function spawnThreat(){
  threatPenetrateCounter++;
  const isPenetrator = (threatPenetrateCounter % 12 === 0);
  const hitsBuilding = Math.random()<0.5;
  const sp = H/(28*60);

  // מגיע משני כיוונים — ימין (לבנון) או שמאל (איראן)
  const fromRight = Math.random()<0.5;
  const sx = fromRight ? W+40 : -40;
  const sy = H*0.08 + Math.random()*H*0.18;
  let tx;
  if(hitsBuilding){
    tx = Math.random()<0.6
      ? LEFT_BLD.x + LEFT_BLD.w*0.5
      : RIGHT_BLD.x + RIGHT_BLD.w*0.4;
  } else {
    tx = W*0.20 + Math.random()*W*0.50;
  }
  const dx=tx-sx, dy=GY-sy, dist=Math.hypot(dx,dy);
  const vx0=dx/dist*sp, vy0=dy/dist*sp;

  threats.push({
    type:'rocket', label: fromRight?'לבנון':'איראן',
    x:sx, y:sy,
    vx:vx0, vy:vy0,
    trail:[], dead:false, hitsBuilding,
    splitDone:false, diveDone:false,
    isPenetrator,
    speed:()=>sp
  });
}

// ── Game ──
function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('result-overlay').style.display='none';
  gs='playing'; frame=0; impactFrame=0; impactTimer=-1;
  threats=[]; debris=[]; particles=[]; interceptors=[]; bonuses=[]; reporters=[];
  drag=null; trail=[];
  pressure=0; streetWaveTimer=0; streetPending=0;
  destroyedLeft=false; destroyedRight=false;
  score=0; interceptTimer=0; shakeFrame=0; shakeAmt=6; marchStep=0; marchTimer=0;
  ambientTimer=0; savedSoundCooldown=0;
  warningAlpha=0; warningText='';
  replayBtn=null;
  layout();
  spawnPersons();
  scheduleThreats();
  requestAnimationFrame(loop);
}

let threatSchedule=[];
let threatPenetrateCounter=0; // every 10th threat is a penetrator

function scheduleThreats(){
  threatSchedule=[];
  const startFrame=2*60, endFrame=19*60;
  const n=8+Math.floor(Math.random()*3); // 8-10 missiles in 20s
  for(let i=0;i<n;i++){
    const t=Math.floor(startFrame + i*(endFrame-startFrame)/(n-1));
    threatSchedule.push(t + Math.floor((Math.random()-0.5)*40));
  }
  threatSchedule.sort((a,b)=>a-b);
}

function loop(){
  frame++;
  if(gs==='playing'){
    update();
    if(threats.length>0) playMarch();
    playAmbient();
  } else if(gs==='animals-boom'){
    debris.forEach(d=>{ d.x+=d.vx; d.y+=d.vy; d.vy+=0.35; d.rot+=d.rotV; d.life--; });
    debris=debris.filter(d=>d.life>0);
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; p.vx*=0.92; p.vy*=0.92; });
    particles=particles.filter(p=>p.life>0);
  }
  draw();
  if(gs!=='result') requestAnimationFrame(loop);
}

function update(){
  // Spawn scheduled threats
  while(threatSchedule.length&&threatSchedule[0]<=frame){
    threatSchedule.shift(); spawnThreat();
  }

  // ── Street waves: pending pool + continuous refill if street gets sparse ──
  streetWaveTimer++;
  if(streetWaveTimer>20){
    streetWaveTimer=0;
    spawnStreetPerson();
  }
  // תמיד: אם הרחוב מתדלדל מתחת ל-10 — שולחים עוד מיד
  const streetActive=persons.filter(p=>p.inBuilding==='street'&&!p.saved&&!p.dead).length;
  if(streetActive < 10 && frame > 30){
    for(let i=0;i<3;i++) spawnStreetPerson();
  }

  // ── Autonomous movement ──
  const closestThreatY=threats.length>0?Math.min(...threats.map(t=>t.y)):Infinity;
  const threatNear=closestThreatY<H*0.55;

  // כולם זזים תמיד — המשחק רק מזרז בגרירה
  persons.forEach(p=>{
    if(p.saved||p.dead) return;
    if(p.inBuilding==='left')  p._moving=true;
    if(p.inBuilding==='right') p._autoMove=true;
  });

  persons.forEach(p=>{
    if(p.saved||p.dead||p.dragging) return;
    p.wobble+=0.08;

    // ── Street people ──
    if(p.inBuilding==='street'){
      // רק אם לא יורד למקלט — נשאר על קרקע
      if(!p._descending) p.y = GY;

      if(!p.auto) {
        // חיות ברחוב — זז אופקית
        const animalSpd3=p.kind==='cat'?2.2:1.6;
        if(Math.random()<0.02) p.animalDir*=-1;
        p.x+=p.animalDir*animalSpd3;
        const minXa=LEFT_BLD.x+LEFT_BLD.w+6, maxXa=RIGHT_BLD.x-6;
        if(p.x<minXa){p.animalDir=1;p.x=minXa;}
        if(p.x>maxXa){p.animalDir=-1;p.x=maxXa;}
        return;
      }
      {
        const panicMult = threatNear ? 4.0 : 1.0;
        const spd = p.autoSpeed * panicMult;
        const entryX = SHELTER.entryX;

        if(!p._descending){
          const dxEntry=entryX-p.x;
          if(Math.abs(dxEntry)>6) p.x+=Math.sign(dxEntry)*spd;
          else { p._descending=true; p.x=entryX; }
        } else {
          // יורד בתוך המקלט — y גדל
          const targetY = SHELTER.y + SHELTER.h*0.5;
          p.y += spd*2.2;
          if(p.y >= targetY) { p.saved=true; }
        }
      }
      return;
    }

    // ── Left building ──
    if(p.inBuilding==='left'){
      const myFloorY = LEFT_BLD.y + LEFT_BLD.flH*(LEFT_BLD.floors - p.homeFloor);
      const stairX   = LEFT_BLD.x + LEFT_BLD.w - 6;
      const stairLeft= LEFT_BLD.x + LEFT_BLD.w*0.55; // קצה שמאלי של חזרה אופקית

      if(p.kind==='dog'||p.kind==='cat'){
        p.y = myFloorY;
        p.animalDir = p.animalDir||1;
        const animalSpd2 = p.kind==='cat'?2.0:1.4;
        p.x += p.animalDir*animalSpd2;
        if(p.x<LEFT_BLD.x+6){ p.animalDir=1; p.x=LEFT_BLD.x+6; }
        if(p.x>stairX-4){ p.animalDir=-1; p.x=stairX-4; }
        return;
      }

      const SPD_WALK = (p.autoSpeed||0.22) * (p.dragging ? 5.0 : 1.2);
      const SPD_DOWN  = (p.autoSpeed||0.22) * (p.dragging ? 2.5 : 0.6);

      if(!p._moving){
        p.y = myFloorY;
        return;
      }

      // ── State machine לירידה במדרגות — זיגזג אלכסוני ──
      if(!p._stairPhase) p._stairPhase='toStair';

      // אנשים שנגררו מעל המדרגות — התחל ישירות
      if(p._stairPhase==='toStair'){
        const aboveStair = p.x > stairLeft-4 && p.x <= stairX+4;
        if(aboveStair){
          p._stairPhase='zagDown'; // ימינה-למטה
          p._zagTargetX = stairX;
          p._zagTargetY = myFloorY + LEFT_BLD.flH*0.5;
        }
      }

      if(p._stairPhase==='toStair'){
        // הלך ימינה לראש המדרגות
        p.y = myFloorY;
        const dx = stairX - p.x;
        if(Math.abs(dx)>3){ p.x += Math.sign(dx)*SPD_WALK; }
        else {
          p.x=stairX;
          // מתחיל זיגזג ראשון: ימינה-למטה
          p._stairPhase='zagDown';
          p._zagTargetX = stairLeft;          // יעד X: שמאלה
          p._zagTargetY = myFloorY + LEFT_BLD.flH*0.5; // יעד Y: חצי קומה למטה
        }

      } else if(p._stairPhase==='zagDown'){
        // אלכסון: שמאלה + למטה בו זמנית
        const tx = p._zagTargetX, ty = p._zagTargetY;
        const ddx = tx - p.x, ddy = ty - p.y;
        const dist = Math.hypot(ddx, ddy);
        if(dist > 2){
          p.x += ddx/dist * SPD_DOWN * 1.4;
          p.y += ddy/dist * SPD_DOWN * 1.4;
        } else {
          p.x = tx; p.y = ty;
          if(p.y >= GY - 2){
            // הגיע לקרקע
            p.y = GY; p._stairPhase='toShelter';
            p.inBuilding='street'; p.auto=true; p._descending=false;
          } else {
            // עובר לכיוון ההפוך
            p._stairPhase='zagUp';
            p._zagTargetX = stairX;                       // חזרה ימינה
            p._zagTargetY = Math.min(p.y + LEFT_BLD.flH*0.5, GY); // חצי קומה נוספת
          }
        }

      } else if(p._stairPhase==='zagUp'){
        // אלכסון: ימינה + למטה בו זמנית
        const tx = p._zagTargetX, ty = p._zagTargetY;
        const ddx = tx - p.x, ddy = ty - p.y;
        const dist = Math.hypot(ddx, ddy);
        if(dist > 2){
          p.x += ddx/dist * SPD_DOWN * 1.4;
          p.y += ddy/dist * SPD_DOWN * 1.4;
        } else {
          p.x = tx; p.y = ty;
          if(p.y >= GY - 2){
            p.y = GY; p._stairPhase='toShelter';
            p.inBuilding='street'; p.auto=true; p._descending=false;
          } else {
            p._stairPhase='zagDown';
            p._zagTargetX = stairLeft;
            p._zagTargetY = Math.min(p.y + LEFT_BLD.flH*0.5, GY);
          }
        }
      }
      return;
    }

    // ── Right building ──
    const m=MAAMAD_FLOORS[p.homeFloor];
    if(!m) return;
    // וודא שהדמות עומדת על קו הרצפה שלה
    const myFloorY = RIGHT_BLD.y + RIGHT_BLD.flH*(FLOORS - p.homeFloor);
    p.y = myFloorY;

    // Animals: horizontal only on floor line
    if(p.kind==='dog'||p.kind==='cat'){
      p.animalTimer=(p.animalTimer||0)+1;
      const timeRatio = Math.min(1, frame / (20*60));
      const agitation = p.kind==='cat' ? (0.025 + pressure*0.06 + timeRatio*0.05) : 0.015;
      if(Math.random()<agitation){ p.animalDir*=-1; }
      const animalSpd=p.kind==='cat' ? (2.0 + pressure*2.5 + timeRatio*1.5) : 1.4;
      p.x+=p.animalDir*animalSpd;
      const bldLeft=RIGHT_BLD.x+6;
      const maamadW = m.w||RIGHT_BLD.w*0.28;
      const bldRight=RIGHT_BLD.x+RIGHT_BLD.w-maamadW-8;
      if(p.x<bldLeft){ p.animalDir=1; p.x=bldLeft; }
      if(p.x>bldRight){ p.animalDir=-1; p.x=bldRight; }
      return;
    }

    // Persons: move horizontally to maamad — תמיד, גרירה מזרזת
    const targetX = m.x + m.w/2;
    const dx2 = targetX - p.x;
    const spd2 = p.autoSpeed * (p.dragging ? 6.0 : 1.0);
    if(Math.abs(dx2)>4){
      p.x += Math.sign(dx2)*spd2;
    } else {
      p.saved=true;
    }
  });

  // ── Interceptors ──
  interceptTimer++;
  if(threats.length>0 && interceptTimer > 60*(1.2+Math.random()*1.2)){
    interceptTimer=0;
    const nFire=Math.random()<0.5?2:1;
    // רק איומים שכבר עשו שליש מהדרך בתוך המסך — נראים טוב
    const visibleThreats=threats.filter(t=>{
      if(t.isPenetrator) return false;
      if(t.type==='cruise'||t.type==='rocket'||t.type==='short')
        return t.x > W*0.33; // מהצד — שליש מסך מימין
      return t.y > H*0.30;   // מלמעלה — שליש מסך למטה
    });
    for(let fi=0;fi<nFire&&fi<visibleThreats.length;fi++){
      const target=visibleThreats[fi];
      const launchType = Math.floor(Math.random()*4);
      let launchX, launchY;
      if(launchType===0){
        launchX = W*0.05 + Math.random()*W*0.90;
        launchY = GY;
      } else if(launchType===1){
        launchX = RIGHT_BLD.x + Math.random()*RIGHT_BLD.w;
        launchY = RIGHT_BLD.y;
      } else if(launchType===2){
        launchX = LEFT_BLD.x + Math.random()*LEFT_BLD.w;
        launchY = LEFT_BLD.y;
      } else {
        launchX = Math.random()<0.5 ? W*0.05 : W*0.95;
        launchY = GY*0.3 + Math.random()*GY*0.5;
      }
      // ── חישוב נקודת שליטה פעם אחת בלבד ──
      const midX = (launchX + target.x) / 2;
      const midY = (launchY + target.y) / 2;
      const cpx = midX + (Math.random()<0.5?-1:1)*W*0.06;
      const cpy = Math.max(H*0.10, midY - H*0.18);
      interceptors.push({
        launchX, launchY,
        tx: target.x, ty: target.y,
        cpx, cpy,          // נשמרים — לא משתנים
        threat: target,
        progress:0, done:false,
        curX: launchX, curY: launchY
      });
    }
  }

  interceptors.forEach(ic=>{
    if(ic.done) return;
    ic.progress=Math.min(1, ic.progress+0.028);
    // מעדכנים יעד לפי מיקום הטיל הנוכחי — אבל cpx/cpy קבועים
    if(ic.threat&&!ic.threat.dead){ ic.tx=ic.threat.x; ic.ty=ic.threat.y; }
    const t2=ic.progress;
    ic.curX=(1-t2)*(1-t2)*ic.launchX+2*(1-t2)*t2*ic.cpx+t2*t2*ic.tx;
    ic.curY=(1-t2)*(1-t2)*ic.launchY+2*(1-t2)*t2*ic.cpy+t2*t2*ic.ty;

    // פגיעה — רק אחרי שהמיירט עשה 35% מהדרך (נראה בתוך המסך)
    if(ic.progress>0.35){
      for(let i=threats.length-1;i>=0;i--){
        const t=threats[i];
        if(t.isPenetrator) continue;
        if(Math.hypot(ic.curX-t.x, ic.curY-t.y)<36){
          spawnShrapnel(t.x, t.y);
          t.dead=true; ic.done=true;
          shakeFrame=10; shakeAmt=6;
          soundIntercept();
          break;
        }
      }
    }
    if(ic.progress>=1) ic.done=true;
  });
  interceptors=interceptors.filter(ic=>!ic.done);

  // ── Bonuses (float-up text) ──
  bonuses=bonuses.filter(b=>{ b.y-=1.1; b.life--; return b.life>0; });

  // ── TV Reporters crossing the street ──
  if(Math.random()<0.004 && reporters.filter(r=>!r.done).length<2){
    const fromRight=Math.random()<0.5;
    // Start just outside the gap between buildings
    const startX=fromRight ? RIGHT_BLD.x-30 : LEFT_BLD.x+LEFT_BLD.w+30;
    reporters.push({
      x: startX,
      y: GY-22,
      dir: fromRight?-1:1,
      speed: 0.4+Math.random()*0.3,
      wobble: 0,
      done: false,
      camSide: fromRight?1:-1,
      minX: LEFT_BLD.x+LEFT_BLD.w+10,  // don't go past left building
      maxX: RIGHT_BLD.x-10              // don't go past right building
    });
  }
  reporters.forEach(r=>{
    r.x+=r.dir*r.speed;
    r.wobble+=0.12;
    // Stop at building edges and turn around, or mark done
    if(r.x<r.minX||r.x>r.maxX) r.done=true;
  });
  reporters=reporters.filter(r=>!r.done);


  const unsaved=persons.filter(p=>!p.saved&&!p.dead).length;
  const targetPressure = threatNear ? Math.min(1, unsaved/8) : Math.min(0.4, unsaved/12);
  pressure += (targetPressure - pressure)*0.04;

  // Move threats
  const newThreats=[];
  threats.forEach(t=>{
    if(t.dead) return;

    // Cruise moves horizontally then dives mid-screen
    if(t.type==='cruise'){
      t.x+=t.vx;
      // צולל בחצי השני של המסך לעבר בניין
      if(!t.diveDone && t.x > W*0.50){
        t.diveDone=true;
        const targetX = RIGHT_BLD.x + RIGHT_BLD.w*0.5 + (Math.random()-0.5)*30;
        const targetY = RIGHT_BLD.y + RIGHT_BLD.h*0.3;
        const ddx=targetX-t.x, ddy=targetY-t.y;
        const ddist=Math.hypot(ddx,ddy);
        const curSp=Math.abs(t.vx)*1.2;
        t.vx=ddx/ddist*curSp; t.vy=ddy/ddist*curSp;
        t.hitsBuilding=true;
      }
      if(t.vy) t.y+=t.vy;

    } else if(t.type==='rocket'){
      // רקטה: בחצי הראשון ישרה, בחצי השני מכופפת לעבר בניין
      t.x+=t.vx; t.y+=t.vy;
      if(t.hitsBuilding && !t.diveDone && t.y > H*0.38){
        t.diveDone=true;
        const bts=[LEFT_BLD.x+LEFT_BLD.w/2, RIGHT_BLD.x+RIGHT_BLD.w/2];
        const bx=bts[Math.floor(Math.random()*bts.length)];
        const rdx=bx-t.x, rdy=GY-t.y, rdist=Math.hypot(rdx,rdy);
        const rsp=Math.hypot(t.vx,t.vy)*1.05;
        t.vx=rdx/rdist*rsp; t.vy=rdy/rdist*rsp;
      }

    } else {
      t.x+=t.vx; t.y+=t.vy;
    }

    t.trail.unshift({x:t.x,y:t.y});
    if(t.trail.length>50) t.trail.pop(); // שובל ארוך יותר

    // Short missile splits into 3 fragments mid-air
    if(t.type==='short'&&!t.splitDone&&t.y>H*0.38){
      t.splitDone=true;
      const sp=Math.max(1, Math.hypot(t.vx,t.vy));
      [-0.45, 0, 0.45].forEach((ang,i)=>{
        newThreats.push({
          type:'fragment', speed:()=>sp, label:'שבר',
          x:t.x+(Math.random()-0.5)*10, y:t.y,
          vx:Math.sin(ang)*sp*0.7+(Math.random()-0.5)*0.5,
          vy:Math.cos(ang)*sp*0.8,
          trail:[], dead:false,
          hitsBuilding:i===1&&t.hitsBuilding, splitDone:true,
          rotAngle:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.18
        });
      });
      spawnShrapnel(t.x, t.y); // small split flash
      t.dead=true; return;
    }

    // Rotate fragments
    if(t.rotAngle!==undefined) t.rotAngle+=t.rotSpeed||0;

    // ── Check building hit DURING FLIGHT (every frame) ──
    const rCx2=RIGHT_BLD.x+RIGHT_BLD.w/2, lCx2=LEFT_BLD.x+LEFT_BLD.w/2;
    const hitRightNow = t.hitsBuilding &&
      Math.abs(t.x-rCx2)<RIGHT_BLD.w*0.52 &&
      t.y>RIGHT_BLD.y && t.y<GY;
    const hitLeftNow  = t.hitsBuilding &&
      Math.abs(t.x-lCx2)<LEFT_BLD.w*0.52  &&
      t.y>LEFT_BLD.y && t.y<GY;

    // Hit ground or exit screen (open ground — no building damage)
    if(t.y>GY-20||t.x>W+80||t.x<-80){
      if(!hitRightNow && !hitLeftNow) triggerImpact(t); // open ground
      t.dead=true;
    }
    // Hit building mid-flight
    if(hitRightNow||hitLeftNow){
      triggerImpact(t); t.dead=true;
    }
  });
  threats=threats.filter(t=>!t.dead).concat(newThreats);

  // Debris + shrapnel
  debris.forEach(d=>{
    d.x+=d.vx; d.y+=d.vy; d.vy+=0.35; d.rot+=d.rotV; d.life--;
    // Shrapnel does NOT damage buildings — visual only
  });
  debris=debris.filter(d=>d.life>0);

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; p.vx*=0.92; p.vy*=0.92; });
  particles=particles.filter(p=>p.life>0);

  // End game
  if(destroyedLeft||destroyedRight){
    if(impactTimer<0) impactTimer=frame;
    if(frame-impactTimer>80) showResult('hit');
  } else if(threatSchedule.length===0&&threats.length===0){
    if(impactTimer<0) impactTimer=frame;
    if(frame-impactTimer>120) showResult('time');
  }

  if(drag){ drag.person.x=drag.wx; drag.person.y=drag.wy; }
}

function triggerAnimalOverflow(cx, cy, where){
  if(gs!=='playing') return;
  gs='animals-boom'; // special state: freeze input, show warning

  // Multiple explosions from the shelter/maamad
  spawnShrapnel(cx, cy);
  setTimeout(()=>spawnShrapnel(cx+20, cy-15), 200);
  setTimeout(()=>spawnShrapnel(cx-25, cy+10), 380);

  // Big shake
  shakeFrame=30; shakeAmt=14;

  soundAnimalBoom();

  // Show warning overlay for 2s then show result
  const where_heb = where==='maamad'?'בממ"ד':'במקלט';
  showAnimalWarning(where_heb);
  setTimeout(()=>showResult('animals'), 2200);
}

let warningAlpha=0, warningText='';
function showAnimalWarning(where_heb){
  warningText=where_heb;
  warningAlpha=1;
  // Pulse for 2s
  const pulse=()=>{
    if(gs==='animals-boom'){
      warningAlpha=0.5+0.5*Math.abs(Math.sin(Date.now()*0.006));
      requestAnimationFrame(pulse);
    }
  };
  pulse();
}

function drawAnimalWarning(){
  if(!warningAlpha||warningAlpha<0.01||(gs!=='animals-boom'&&gs!=='playing')) return;
  // Red flash overlay
  ctx.save();
  ctx.fillStyle=`rgba(200,10,10,${warningAlpha*0.22})`;
  ctx.fillRect(0,0,W,H);

  // Big centered warning box
  const bw=W*0.88, bh=H*0.22, bx=(W-bw)/2, by=H*0.36;
  ctx.fillStyle=`rgba(180,0,0,${warningAlpha*0.9})`;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.fill();
  ctx.strokeStyle=`rgba(255,80,80,${warningAlpha})`;
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(bx+2,by+2,bw-4,bh-4,9); ctx.stroke();

  // Warning text — big
  ctx.fillStyle=`rgba(255,255,255,${warningAlpha})`;
  ctx.textAlign='center';
  ctx.font=`bold ${Math.round(W*.055)}px Courier New`;
  ctx.fillText('💥 יותר מ-4 חיות!', W/2, by+bh*0.42);
  ctx.font=`${Math.round(W*.035)}px Courier New`;
  ctx.fillText(`המרחב המוגן ${warningText} התפוצץ — המשחק נגמר`, W/2, by+bh*0.75);

  // Cat & dog emoji flying off
  ctx.font=`${Math.round(W*.065)}px serif`;
  const t=Date.now()*0.004;
  ctx.fillText('😺', W/2-W*.22+Math.sin(t)*8, by-20+Math.cos(t*1.3)*10);
  ctx.fillText('🐕', W/2+W*.16+Math.sin(t*0.8)*10, by-15+Math.cos(t)*8);
  ctx.fillText('🐈', W/2-W*.05+Math.sin(t*1.2)*6, by-35+Math.cos(t*0.9)*6);

  ctx.restore();
}

function spawnShrapnel(x, y){
  // Dramatic mid-air explosion
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*7;
    const vx=Math.cos(a)*s, vy=Math.sin(a)*s-(2+Math.random()*2);
    debris.push({
      x, y, vx, vy,
      w:2+Math.random()*8, h:2+Math.random()*5,
      rot:Math.random()*Math.PI*2, rotV:(Math.random()-.5)*.4,
      life:50+Math.random()*40, isShrapnel:true
    });
  }
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*7;
    particles.push({
      x, y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-4,
      life:40,
      color:['#f08020','#f04010','#ffcc00','#ff6600','#fff'][Math.floor(Math.random()*5)]
    });
  }
  // Flash rings — drawn as large particles
  for(let i=0;i<4;i++){
    particles.push({
      x:x+(Math.random()-0.5)*10, y:y+(Math.random()-0.5)*10,
      vx:0, vy:0, life:8+i*2,
      color:'rgba(255,220,100,0.6)', size:8+i*6
    });
  }
}

function triggerImpact(t){
  // Kill unsaved people near impact
  persons.forEach(p=>{
    if(!p.saved&&!p.dead&&Math.hypot(p.x-t.x,p.y-t.y)<70) p.dead=true;
  });

  // Building destruction — only if hitsBuilding flag set AND inside building zone
  const rCx=RIGHT_BLD.x+RIGHT_BLD.w/2, lCx=LEFT_BLD.x+LEFT_BLD.w/2;
  const hitRight = t.hitsBuilding && Math.abs(t.x-rCx)<RIGHT_BLD.w*0.45 &&
                   t.y>RIGHT_BLD.y && t.y<GY+20;
  const hitLeft  = t.hitsBuilding && Math.abs(t.x-lCx)<LEFT_BLD.w*0.45  &&
                   t.y>LEFT_BLD.y  && t.y<GY+20;
  if(hitRight && !destroyedRight){ destroyedRight=true; shakeFrame=22; shakeAmt=13; soundImpact(); impactTimer=frame; }
  if(hitLeft  && !destroyedLeft) { destroyedLeft=true;  shakeFrame=22; shakeAmt=13; soundImpact(); impactTimer=frame; }

  const big = hitRight||hitLeft;
  const nDebris = big?26:9;
  for(let i=0;i<nDebris;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*8;
    debris.push({x:t.x+(Math.random()-0.5)*40,y:t.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,
      w:4+Math.random()*16,h:3+Math.random()*12,rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-.5)*.25, life:60+Math.random()*50});
  }
  const nPart=big?18:7;
  for(let i=0;i<nPart;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*6;
    particles.push({x:t.x,y:t.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-5,life:35,
      color:i%3===0?'#f08020':'#c04020'});
  }
}

// ── Input ──
function pt(e){ const r=C.getBoundingClientRect(); return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top}; }

function onDown(pos){
  if(gs!=='playing') return;
  // אזור גרירה גדול למובייל
  const grabR = ('ontouchstart' in window) ? 40 : 22;
  const p=persons.find(p=>!p.saved&&!p.dead&&Math.hypot(p.x-pos.x,p.y-pos.y)<grabR);
  if(p){
    drag={person:p,wx:pos.x,wy:pos.y-8}; p.dragging=true; trail=[pos];
    // רטט קצר בתפיסה
    if(navigator.vibrate) navigator.vibrate(18);
    if(p.kind==='dog') soundBark();
    else if(p.kind==='cat') soundMeow();
    else if(p.kind==='walker') soundWalker();
  }
}
function onMove(pos){
  if(!drag) return;
  drag.wx=pos.x; drag.wy=pos.y-8;
  trail.push(pos); if(trail.length>20) trail.shift();
}
function onUp(pos){
  if(!drag) return;
  const p=drag.person; p.dragging=false;
  checkDrop(p);
  drag=null; trail=[];
}

function checkDrop(p){
  const isAnimal = p.kind==='cat'||p.kind==='dog';
  const isVulnerable = p.kind==='wheelchair'||p.kind==='walker'||p.kind==='pregnant';

  // ── ממ"ד: כל דמות שנגררת לתוך ממ"ד — נכנסת ──
  for(const m of MAAMAD_FLOORS){
    if(p.x>m.x && p.x<m.x+m.w && p.y>m.y-20 && p.y<m.y+m.h+20){
      p.saved=true; p.shelter='maamad'; p.homeFloor=m.floor;
      p.x=m.x+m.w/2+(Math.random()-0.5)*20;
      p.y=m.y+m.h/2;
      p.waveAnim=18;
      if(navigator.vibrate) navigator.vibrate([12,30,25]);
      const pts = p.kind==='cat'?9 : p.kind==='dog'?3 : isVulnerable?3 : 1;
      const emoji = p.kind==='cat'?'😺' : p.kind==='dog'?'🐕' : isVulnerable?'⭐':'✓';
      bonuses.push({x:m.x+m.w/2, y:m.y-10, text:`+${pts} ${emoji}`, life:110,
        color: isAnimal?'#a020e0':'#1a6432'});
      if(p.kind==='cat') soundMeow(); else soundBonus();
      return;
    }
  }

  // ── מקלט: כל דמות מעל המדרגות או בתוך המקלט — נכנסת ──
  const s=SHELTER;
  const dropX1=s.stairX-10, dropX2=s.x+s.w+10, dropY1=GY-50, dropY2=s.y+s.h+10;
  if(p.x>dropX1 && p.x<dropX2 && p.y>dropY1 && p.y<dropY2){
    p.saved=true; p.shelter='shelter';
    p.x=s.x+s.w/2+(Math.random()-0.5)*(s.w*.6);
    p.y=s.y+s.h/2;
    p.waveAnim=18;
    if(navigator.vibrate) navigator.vibrate([12,30,25]);
    const pts = p.kind==='cat'?9 : p.kind==='dog'?3 : isVulnerable?3 : 1;
    const emoji = p.kind==='cat'?'😺' : p.kind==='dog'?'🐕' : isVulnerable?'⭐':'✓';
    bonuses.push({x:s.x+s.w/2, y:s.y-10, text:`+${pts} ${emoji}`, life:110,
      color: isAnimal?'#a020e0':'#1a6432'});
    if(p.kind==='cat') soundMeow(); else soundBonus();
    return;
  }

  snapBack(p);
}

function snapBack(p){
  // Keep where dropped if on a valid surface, else original
  p.y=Math.min(p.y, GY-15);
}

// ── Draw ──
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // רעד מתגבר ככל שהזמן אוזל
  const elapsed=frame/60;
  const remaining=Math.max(0,20-elapsed);
  const timeShake = remaining<8 ? (8-remaining)/8 * 2.5 : 0;
  const totalShake = shakeFrame>0 ? shakeAmt : timeShake;

  if(totalShake>0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*totalShake, (Math.random()-0.5)*totalShake);
    if(shakeFrame>0) shakeFrame--;
  }

  drawGround();
  drawShelter();
  if(destroyedLeft) drawRuinLeft(); else drawLeftBuilding();
  if(destroyedRight) drawRuinRight(); else { drawRightBuilding(); drawMaamadFloors(); }
  drawParticles();
  drawDebris();
  drawThreats();
  drawInterceptors();
  drawReporters();
  drawBonuses();
  drawPersons();
  drawTrail();
  drawAnimalWarning();
  drawHUD(); // מעל האזהרה — הניקוד תמיד נראה

  if(totalShake>0){
    try{ ctx.restore(); }catch(e){}
  }
}

function drawGround(){
  ctx.fillStyle='#f0f0ea'; ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();
  // Road dashes
  ctx.strokeStyle='#ddd'; ctx.lineWidth=1; ctx.setLineDash([14,10]);
  ctx.beginPath(); ctx.moveTo(0,GY+H*0.025); ctx.lineTo(W,GY+H*0.025); ctx.stroke();
  ctx.setLineDash([]);
}

function drawShelter(){
  const s=SHELTER;
  const savedInShelter=persons.filter(p=>p.saved&&p.shelter==='shelter');
  const count=savedInShelter.length;

  // ── חדר תת-קרקעי ──
  const fillAlpha=0.06+count*0.010;
  ctx.fillStyle=`rgba(40,40,120,${Math.min(fillAlpha,0.25)})`;
  ctx.fillRect(s.x, s.y, s.w, s.h);
  // מסגרת עבה
  ctx.strokeStyle='#222'; ctx.lineWidth=2.5;
  ctx.strokeRect(s.x, s.y, s.w, s.h);
  // קו תקרה כהה יותר
  ctx.strokeStyle='#111'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x+s.w, s.y); ctx.stroke();

  // ── דמויות ניצולים בתוך המקלט ──
  if(count>0){
    const cols = Math.max(1, Math.floor(s.w / 14));
    savedInShelter.forEach((p,i)=>{
      const col = i % cols;
      const row = Math.floor(i / cols);
      const px = s.x + 8 + col * 14;
      const floorY = s.y + s.h - row * 14; // רצפה מלמטה
      drawPersonAt(p, px, floorY);
    });
  }

  // ── כיתוב מקלט + מונה (מעל הדמויות) ──
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillRect(s.x+s.w*0.45, s.y+2, s.w*0.52, s.h*0.92);
  ctx.fillStyle='#334'; ctx.font=`bold ${Math.round(s.w*0.11)}px Courier New`;
  ctx.textAlign='right';
  ctx.fillText('מקלט', s.x+s.w-8, s.y+s.h*0.42);
  ctx.font=`bold ${Math.round(s.h*0.48)}px Courier New`;
  ctx.fillStyle= count===0?'#aaa':'#1a3a8a';
  ctx.fillText(String(count), s.x+s.w-8, s.y+s.h*0.85);

  // ── מדרגות משמאל ──
  const sx=s.stairX, sw2=s.stairW;
  const steps=5, stepH=s.h/steps, stepW=sw2/steps;
  ctx.fillStyle='#e8e8e0'; ctx.strokeStyle='#222'; ctx.lineWidth=1.5;
  // מילוי רקע מדרגות
  ctx.fillRect(sx, GY, sw2, s.h);
  ctx.strokeRect(sx, GY, sw2, s.h);
  // שלבי מדרגות
  ctx.strokeStyle='#444'; ctx.lineWidth=1.2;
  for(let i=0;i<steps;i++){
    const stepY=GY+i*stepH;
    const stepX=sx+sw2-i*stepW-stepW;
    ctx.beginPath();
    ctx.moveTo(stepX, stepY);
    ctx.lineTo(stepX+stepW, stepY);       // אופקי
    ctx.lineTo(stepX+stepW, stepY+stepH); // אנכי
    ctx.stroke();
  }
  // קו מחבר מדרגות לחדר
  ctx.strokeStyle='#111'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(s.x, GY); ctx.lineTo(s.x, s.y+s.h); ctx.stroke();
}

function drawLeftBuilding(){
  const b=LEFT_BLD;
  // גוף הבניין
  ctx.fillStyle='#f2f2ee'; ctx.strokeStyle='#222'; ctx.lineWidth=1.5;
  ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeRect(b.x,b.y,b.w,b.h);
  // גג שטוח (כמו בניין ימין)
  ctx.fillStyle='#e0e0da'; ctx.fillRect(b.x-3,b.y-7,b.w+6,8);
  ctx.strokeStyle='#222'; ctx.lineWidth=1.2; ctx.strokeRect(b.x-3,b.y-7,b.w+6,8);

  // קווי קומות
  ctx.strokeStyle='#ccc'; ctx.lineWidth=0.8;
  for(let f=1;f<b.floors;f++){
    const fy=b.y+b.flH*f;
    ctx.beginPath(); ctx.moveTo(b.x,fy); ctx.lineTo(b.x+b.w,fy); ctx.stroke();
  }

  // חלונות — 2 לקומה
  ctx.strokeStyle='#aab'; ctx.lineWidth=0.8;
  const winW=b.w*0.2, winH=b.flH*0.35;
  for(let f=0;f<b.floors;f++){
    const fy=b.y+b.flH*f+b.flH*0.2;
    ctx.strokeRect(b.x+b.w*0.12, fy, winW, winH);
    ctx.strokeRect(b.x+b.w*0.55, fy, winW, winH);
  }

  // פיר מדרגות (ימין)
  const sw=b.w*0.18, sx=b.x+b.w-sw;
  ctx.fillStyle='rgba(180,180,160,.18)'; ctx.fillRect(sx,b.y,sw,b.h);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=0.7; ctx.strokeRect(sx,b.y,sw,b.h);
  ctx.strokeStyle='#ccc'; ctx.lineWidth=0.6;
  const sH=b.h/9;
  for(let s=0;s<9;s++){
    const sy2=b.y+b.h-s*sH;
    const side=s%2===0;
    ctx.beginPath(); ctx.moveTo(side?sx:sx+sw, sy2); ctx.lineTo(side?sx+sw:sx, sy2-sH*0.5); ctx.stroke();
  }
  ctx.fillStyle='#bbb'; ctx.font=`${Math.round(sw*0.38)}px Courier New`; ctx.textAlign='center';
  ctx.fillText('מדרגות',sx+sw/2,b.y+b.h/2);
}

function drawRightBuilding(){
  const b=RIGHT_BLD;
  ctx.fillStyle='#f2f2ee'; ctx.strokeStyle='#222'; ctx.lineWidth=1.5;
  ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeRect(b.x,b.y,b.w,b.h);
  // Flat roof line
  ctx.fillStyle='#e0e0da'; ctx.fillRect(b.x-4,b.y-8,b.w+8,10);
  ctx.strokeRect(b.x-4,b.y-8,b.w+8,10);
  // Floor dividers
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
  for(let f=1;f<FLOORS;f++){
    const fy=b.y+b.flH*f;
    ctx.beginPath(); ctx.moveTo(b.x,fy); ctx.lineTo(b.x+b.w,fy); ctx.stroke();
  }
  // Windows per floor
  ctx.strokeStyle='#aab'; ctx.lineWidth=0.8;
  for(let f=0;f<FLOORS;f++){
    const fy=b.y+b.flH*f+b.flH/4;
    ctx.strokeRect(b.x+6,fy,16,12); ctx.strokeRect(b.x+28,fy,16,12);
  }
}

function drawMaamadFloors(){
  MAAMAD_FLOORS.forEach(m=>{
    const savedHere=persons.filter(p=>p.saved&&p.shelter==='maamad'&&p.homeFloor===m.floor).length;
    const totalHere=persons.filter(p=>p.homeFloor===m.floor&&p.shelter==='maamad').length;
    const fillAlpha=0.08+savedHere*0.04;

    // Background — מתכהה עם כניסות
    ctx.fillStyle=`rgba(10,90,40,${Math.min(fillAlpha,0.35)})`; ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.strokeStyle='#1a6432'; ctx.lineWidth=2; ctx.strokeRect(m.x,m.y,m.w,m.h);

    // Label ממ"ד
    ctx.fillStyle='#1a6432'; ctx.font=`bold 8px Courier New`; ctx.textAlign='center';
    ctx.fillText('ממ"ד',m.x+m.w/2,m.y+m.h*.30);

    // מונה חי — גדול ובולט
    const numSize=Math.round(m.h*0.44);
    ctx.font=`bold ${numSize}px Courier New`;
    ctx.fillStyle=savedHere===0?'#aaa':savedHere===totalHere?'#0a5a20':'#1a6432';
    ctx.fillText(String(savedHere), m.x+m.w/2, m.y+m.h*.72);

    // קומה
    ctx.fillStyle='#2a8a4a'; ctx.font='6px Courier New'; ctx.textAlign='center';
    ctx.fillText('קומה '+(m.floor+1), m.x+m.w/2, m.y+m.h*.90);

    // Arrow hint
    ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    const px=RIGHT_BLD.x+RIGHT_BLD.w*0.5;
    const py=m.y+m.h/2;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(m.x+2,py); ctx.stroke();
    ctx.setLineDash([]);
  });
}

// Foot offset: how many px ABOVE floor line each figure's y-param should be
// (figure draws feet at y+footOffset, so we pass floorY - footOffset)
const FOOT_OFFSET = {
  'man':            8,   // legs() → py+22, py=y-14, foot=y+8
  'child-boy':      12,  // py=y-10, foot=py+22=y+12
  'child-boy2':     12,
  'child-girl':     14,  // py=y-10, foot=py+24=y+14
  'elderly-f-skirt':18,  // py=y-14, foot=py+32=y+18
  'elderly-f-dress':22,  // py=y-14, foot=py+36=y+22
  'walker':         14,  // py=y-14, foot=py+28=y+14
  'wheelchair':     2,   // oy=y+8, wheels at oy-6+8=y+10→ bottom~y+10, use 0
  'pregnant':       20,  // py=y-14, foot=py+34=y+20
  'cat':            0,   // body at y-7, legs at y+7 → use 7
  'dog':            0,   // legs at y+8 → use 8
};

function drawPersonAt(p, x, floorY){
  // adjust y so feet land on floorY
  const off = FOOT_OFFSET[p.kind] ?? 8;
  const dy = floorY - off;
  const k = p.kind;
  const w = p.wobble || 0;
  const drag = p.dragging || false;
  if(k==='dog')               drawDog(x, dy, p.color, drag, w, p.animalDir||1);
  else if(k==='cat')          drawCat(x, dy, p.color, drag, w, p.animalDir||1);
  else if(k==='wheelchair')   drawWheelchair(x, dy, p.color, drag);
  else if(k==='walker')       drawWalker(x, dy, p.color, drag, w);
  else if(k==='elderly-f-skirt') drawElderlySkirt(x, dy, p.color, drag, w);
  else if(k==='elderly-f-dress') drawElderlyDress(x, dy, p.color, drag, w);
  else if(k==='man')          drawMan(x, dy, p.color, drag, w);
  else if(k==='child-girl')   drawChildGirl(x, dy, p.color, drag, w);
  else if(k==='pregnant')     drawPregnant(x, dy, p.color, drag, w);
  else                        drawChild(x, dy, p.color, drag, w);
}

function drawPersons(){
  persons.filter(p=>!p.saved&&!p.dead).forEach(p=>{
    p.wobble+=0.09;
    drawPersonAt(p, p.x, p.y);
  });

  // Saved persons in maamad — feet on maamad floor line
  MAAMAD_FLOORS.forEach(m=>{
    const saved = persons.filter(p=>p.saved&&p.shelter==='maamad'&&p.homeFloor===m.floor);
    saved.forEach((p,i)=>{
      const cols = Math.max(1, Math.floor(m.w / 14));
      const col = i % cols;
      const row = Math.floor(i / cols);
      const px = m.x + 6 + col * 14;
      const floorY = m.y + m.h - row * 14; // קו הרצפה של כל שורה
      drawPersonAt(p, px, floorY);
    });
  });
}

// ── Helper: walking legs ──
function legs(x,py,dragging,spd){
  const ls=dragging?5:Math.sin(frame*spd)*5;
  ctx.beginPath(); ctx.moveTo(x,py+13); ctx.lineTo(x-3+ls,py+22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+13); ctx.lineTo(x+3-ls,py+22); ctx.stroke();
}
function dragHalo(x,py){
  ctx.globalAlpha=.13; ctx.strokeStyle='#000'; ctx.lineWidth=14;
  ctx.beginPath(); ctx.arc(x,py+8,12,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1;
}

// Elderly woman — skirt (triangle hem) + hunched
function drawElderlySkirt(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.5;
  const py=y-14, bob=drag?0:Math.sin(w)*0.6;
  ctx.beginPath(); ctx.arc(x,py+bob,5,0,Math.PI*2); ctx.stroke();
  // Body hunched
  ctx.beginPath(); ctx.moveTo(x,py+5+bob); ctx.lineTo(x-1,py+13+bob); ctx.stroke();
  // Skirt (triangle)
  ctx.beginPath(); ctx.moveTo(x-1,py+13+bob); ctx.lineTo(x-9,py+24+bob); ctx.lineTo(x+7,py+24+bob); ctx.closePath(); ctx.stroke();
  // Arms low (elderly)
  ctx.beginPath(); ctx.moveTo(x,py+8+bob); ctx.lineTo(x-7,py+14+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+8+bob); ctx.lineTo(x+7,py+14+bob); ctx.stroke();
  // Legs under skirt (short)
  ctx.beginPath(); ctx.moveTo(x-4,py+24+bob); ctx.lineTo(x-3,py+32+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+3,py+24+bob); ctx.lineTo(x+3,py+32+bob); ctx.stroke();
  if(drag) dragHalo(x,py); ctx.restore();
}

// Elderly woman — full dress (wider triangle)
function drawElderlyDress(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.5;
  const py=y-14, bob=drag?0:Math.sin(w)*0.6;
  ctx.beginPath(); ctx.arc(x,py+bob,5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+5+bob); ctx.lineTo(x,py+13+bob); ctx.stroke();
  // Wide dress
  ctx.beginPath(); ctx.moveTo(x-1,py+10+bob); ctx.lineTo(x-11,py+28+bob); ctx.lineTo(x+9,py+28+bob); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+8+bob); ctx.lineTo(x-8,py+13+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+8+bob); ctx.lineTo(x+8,py+13+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-5,py+28+bob); ctx.lineTo(x-4,py+36+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+2,py+28+bob); ctx.lineTo(x+2,py+36+bob); ctx.stroke();
  if(drag) dragHalo(x,py); ctx.restore();
}

// Man — regular, arms out
function drawMan(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.5;
  const py=y-14;
  ctx.beginPath(); ctx.arc(x,py,5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+5); ctx.lineTo(x,py+15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+9); ctx.lineTo(x-9,py+14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+9); ctx.lineTo(x+9,py+14); ctx.stroke();
  legs(x,py,drag,0.18);
  if(drag) dragHalo(x,py); ctx.restore();
}

// Child boy — smaller, fast walk
function drawChild(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.3;
  const py=y-10; // shorter
  ctx.beginPath(); ctx.arc(x,py,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+4); ctx.lineTo(x,py+11); ctx.stroke();
  // Arms up energetic
  ctx.beginPath(); ctx.moveTo(x,py+7); ctx.lineTo(x-7,py+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+7); ctx.lineTo(x+7,py+3); ctx.stroke();
  // Short legs, fast
  const ls=drag?4:Math.sin(frame*0.35)*6;
  ctx.beginPath(); ctx.moveTo(x,py+11); ctx.lineTo(x-3+ls,py+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+11); ctx.lineTo(x+3-ls,py+18); ctx.stroke();
  if(drag) dragHalo(x,py); ctx.restore();
}

// Child girl — small dress/skirt
function drawChildGirl(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.3;
  const py=y-10;
  ctx.beginPath(); ctx.arc(x,py,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+4); ctx.lineTo(x,py+10); ctx.stroke();
  // Mini skirt
  ctx.beginPath(); ctx.moveTo(x-1,py+9); ctx.lineTo(x-6,py+17); ctx.lineTo(x+5,py+17); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+7); ctx.lineTo(x-6,py+11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,py+7); ctx.lineTo(x+6,py+11); ctx.stroke();
  const ls=drag?3:Math.sin(frame*0.3)*5;
  ctx.beginPath(); ctx.moveTo(x-3,py+17); ctx.lineTo(x-2,py+24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+1,py+17); ctx.lineTo(x+1,py+24); ctx.stroke();
  if(drag) dragHalo(x,py); ctx.restore();
}

// Wheelchair — person in chair
function drawWheelchair(x,y,col,drag){
  // Shifted down 8px so wheels touch ground
  const oy=y+8;
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.arc(x,oy-28,4,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,oy-24); ctx.lineTo(x+2,oy-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,oy-22); ctx.lineTo(x-7,oy-17); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,oy-22); ctx.lineTo(x+8,oy-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-7,oy-14); ctx.lineTo(x+7,oy-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-7,oy-14); ctx.lineTo(x-7,oy-22); ctx.stroke();
  ctx.beginPath(); ctx.arc(x-4,oy-6,8,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+7,oy-6,4,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=0.7;
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2+frame*.015;
    ctx.beginPath(); ctx.moveTo(x-4,oy-6); ctx.lineTo(x-4+Math.cos(a)*8,oy-6+Math.sin(a)*8); ctx.stroke();
  }
  if(drag){ ctx.lineWidth=12; ctx.globalAlpha=.12; ctx.strokeStyle='#000'; ctx.beginPath(); ctx.arc(x,oy-15,15,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  ctx.restore();
}

// Dog
function drawDog(x,y,col,drag,w,dir){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.4;
  const d=dir||1;
  ctx.beginPath(); ctx.ellipse(x,y-6,10,5,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x+d*10,y-8,5,4,0.3,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+d*8,y-12); ctx.lineTo(x+d*6,y-16); ctx.stroke(); // ear
  const ls=Math.sin(frame*.3)*4;
  [-4,-1,3,7].forEach((dx,i)=>{
    ctx.beginPath(); ctx.moveTo(x+dx,y-2); ctx.lineTo(x+dx+(i%2?ls:-ls),y+8); ctx.stroke();
  });
  ctx.beginPath(); ctx.moveTo(x-d*8,y-6); ctx.quadraticCurveTo(x-d*14,y-12,x-d*12,y-16); ctx.stroke(); // tail
  ctx.beginPath(); ctx.arc(x+d*14,y-8,1.5,0,Math.PI*2); ctx.fill(); // nose
  if(drag){ ctx.globalAlpha=.12; ctx.strokeStyle='#000'; ctx.lineWidth=12; ctx.beginPath(); ctx.arc(x,y-6,15,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  ctx.restore();
}

// Cat — pointy ears, arch back
function drawCat(x,y,col,drag,w,dir){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.3;
  const d=dir||1;
  // Body (arched)
  ctx.beginPath(); ctx.ellipse(x,y-7,9,5,d>0?0.2:-0.2,0,Math.PI*2); ctx.stroke();
  // Head
  ctx.beginPath(); ctx.ellipse(x+d*9,y-10,5,4.5,0,0,Math.PI*2); ctx.stroke();
  // Pointed ears
  ctx.beginPath(); ctx.moveTo(x+d*7,y-14); ctx.lineTo(x+d*6,y-19); ctx.lineTo(x+d*10,y-15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+d*10,y-14); ctx.lineTo(x+d*11,y-18); ctx.lineTo(x+d*14,y-14); ctx.stroke();
  // Tail curled up
  ctx.beginPath(); ctx.moveTo(x-d*8,y-6); ctx.quadraticCurveTo(x-d*16,y-4,x-d*14,y-16); ctx.stroke();
  // Legs
  const ls=Math.sin(frame*.28)*3;
  [-4,0,3,7].forEach((dx,i)=>{
    ctx.beginPath(); ctx.moveTo(x+dx,y-2); ctx.lineTo(x+dx+(i%2?ls:-ls),y+7); ctx.stroke();
  });
  // Nose dot
  ctx.beginPath(); ctx.arc(x+d*13,y-10,1.2,0,Math.PI*2); ctx.fill();
  if(drag){ ctx.globalAlpha=.12; ctx.strokeStyle='#000'; ctx.lineWidth=12; ctx.beginPath(); ctx.arc(x,y-6,14,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  ctx.restore();
}

// Walker (elderly with walking frame) — based on sketch: hunched, frame in front
function drawWalker(x,y,col,drag,w){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.4;
  const bob=drag?0:Math.sin(w)*0.4;
  const py=y-14;

  // Head
  ctx.beginPath(); ctx.arc(x-4,py+bob,5,0,Math.PI*2); ctx.stroke();

  // Hunched spine (curved forward)
  ctx.beginPath();
  ctx.moveTo(x-4,py+5+bob);
  ctx.quadraticCurveTo(x-2,py+12+bob, x+2,py+16+bob);
  ctx.stroke();

  // Arms — reaching forward to hold walker frame
  ctx.beginPath(); ctx.moveTo(x-3,py+9+bob); ctx.lineTo(x-10,py+7+bob); ctx.stroke(); // left
  ctx.beginPath(); ctx.moveTo(x+1,py+10+bob); ctx.lineTo(x+8,py+8+bob); ctx.stroke();  // right

  // Legs (slightly bent, slow gait)
  const ls=drag?2:Math.sin(w*0.6)*3;
  ctx.beginPath(); ctx.moveTo(x+2,py+16+bob); ctx.lineTo(x-2+ls,py+28+bob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+2,py+16+bob); ctx.lineTo(x+6-ls,py+28+bob); ctx.stroke();

  // Walking frame (הליכון) — A-shape in front
  const fx=x+10, fy=py+7+bob;
  ctx.lineWidth=1.2;
  // Two vertical sides
  ctx.beginPath(); ctx.moveTo(fx-6,fy); ctx.lineTo(fx-7,fy+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx+6,fy); ctx.lineTo(fx+7,fy+20); ctx.stroke();
  // Top crossbar
  ctx.beginPath(); ctx.moveTo(fx-6,fy); ctx.lineTo(fx+6,fy); ctx.stroke();
  // Middle crossbar
  ctx.beginPath(); ctx.moveTo(fx-6,fy+11); ctx.lineTo(fx+6,fy+11); ctx.stroke();
  // Small wheels (circles at bottom)
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(fx-7,fy+21,2.5,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(fx+7,fy+21,2.5,0,Math.PI*2); ctx.stroke();

  if(drag){
    ctx.globalAlpha=.13; ctx.strokeStyle='#000'; ctx.lineWidth=14;
    ctx.beginPath(); ctx.arc(x,py+12,14,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function miniStick(c,x,y,col){
  c.save(); c.strokeStyle=col; c.fillStyle=col; c.lineWidth=1;

  c.beginPath(); c.moveTo(x,y-3); c.lineTo(x-4,y); c.moveTo(x,y-3); c.lineTo(x+4,y); c.stroke();

function miniAnimal(c,x,y,col,kind){
  c.save(); c.strokeStyle=col; c.fillStyle=col; c.lineWidth=0.9;
